    long_description: "The UCS@school APIs app is a meta app, and provides the basis\
      \ for plugins that run\ninside this app.\n\n \n\nThis app launches a Docker\
      \ container with an [Open Policy Agent](https://www.openpolicyagent.org/) process.\
      \ Outside of the container, the /etc/ucsschool/apis and /var/log/univention/ucsschool-apis\
      \ directories are exposed.\n\n\nThe app does not provide usable functionality\
      \ until plugins are installed.\n"
    name: UCS@school APIs
    short_description: 'An app to expose resources via plugins

