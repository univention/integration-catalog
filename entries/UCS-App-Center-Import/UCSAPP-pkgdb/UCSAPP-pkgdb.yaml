  en-US:
    icon: ucs_logo.svg
    keywords:
    - UCS components
    - Infrastructure
    links:
    - Description: ''
      URL: ''
    long_description: 'This app installs the Software-Monitor. It is a databasethat
      records information

      about installed software packages on UCS systems.Administrators can query the
      database

      via a module in the UCS management systemand gain an overview about release
      information

      and packages installed onsystems in the domain. An administrator can easily
      recognize

      installationproblems during the process of a step-by-step update of a UCS domain.

      UCSsystems automatically update their entries in the database upon installation,removal

      and update of software.

      '
    name: Software installation monitor
    short_description: 'Central monitor for software package status on UCS systems

      '
