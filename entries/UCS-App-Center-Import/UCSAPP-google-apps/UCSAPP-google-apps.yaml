    long_description: "Mit der App „Google Workspace Connector“ (Business & Education)\
      \ bieten\nSie den Anwendern von UCS und UCS@school in Ihrer Organisation einen\
      \ komfortablen\nSingle Sign-on-Zugang zu Gmail, Google-Docs, -Drive und -Kalender\
      \ in der Google Cloud\nan. Zeitgleich bleiben die Identitäten Ihrer Nutzer in\
      \ Ihrer eigenen IT und Sie\nbehalten die volle Kontrolle über diese.  \n\n##\
      \ Google Workspace-Zugang mit dem Nubus Identitymanagement verwalten\nDer Google\
      \ Workspace Connector nutzt die Nubus Identitymanagement Features und ermöglicht\n\
      so für Benutzer einen Google-Zugang mit Single Sign-on zu provisionieren. Dabei\n\
      bestimmt der Administrator, welche Benutzer automatisch zu Google Workspace\
      \ hinzugefügt,\naktualisiert oder gelöscht werden. Das funktioniert sowohl für\
      \ die Business- als\nauch die Education-Variante.  \nDurch das Anwenden des\
      \ Nubus Single Sign-ons für den Login verlässt das Benutzerpasswort\nniemals\
      \ die Nubus Domäne von UCS, somit bleiben Ihre sensiblen Zugangsdaten unter\n\
      Ihrer Kontrolle und Sie haben damit einen Sicherheitsgewinn.   \nEbenfalls hilfreich\
      \ ist die zentrale Lizenzverwaltung. Diese macht es dem IT-Administrator\neinfach,\
      \ Lizenzen und Lizenzkosten jederzeit im Blick zu haben.  \n\n## Single Sign-on\
      \ – Simpler Zugang zur Google Workspace für Ihre Nutzer\nNach dem Sie den Benutzer\
      \ für den Einsatz der Google Workspace berechtigt haben,\nmeldet sich dieser\
      \ wie gewohnt mit seinem Nubus-Benutzernamen und -passwort im Nubus\nPortal\
      \ von UCS an, wird zur Google Workspace weitergeleitet und kann die [Google\
      \ Collaboration Features](https://gsuite.google.de/) nutzen. Dadurch entfällt\
      \ beim Nutzer der Aufwand, ein Google-Konto selbst anzulegen und zu verwalten.\
      \  \nDie App „Google Workspace Connector“ ist für Organisationen geeignet, die\n\
      Google Workspace nutzen möchten, ihre Benutzer aber mit Nubus  verwalten\nwollen.\
      \  \nUm den Connector in Betrieb zu nehmen, ist eine Google Workspace (Test-)Subskription\n\
      erforderlich.\n"
    name: Google Workspace Connector
    short_description: 'Single-Sign-On in Google Workspace für Benutzer von Nubus
      auf UCS

      '
