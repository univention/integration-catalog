      KNOWBODY is a digital education platform for schools, supporting schools
      in managing and providing knowledge and digital educational content.

      ## Integration with UCS@school

      KNOWBODY is connected to UCS@school via the Univention ID Broker.
      Students and teachers can log in to KNOWBODY with their UCS@school
      credentials using Single Sign-On.
