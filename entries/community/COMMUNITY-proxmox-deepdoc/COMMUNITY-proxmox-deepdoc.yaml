    long_description: |
      Community-Dokumentation zur Anbindung von Proxmox an Univention Nubus über
      OpenID Connect (OIDC), einschließlich der Steuerung von Login-Berechtigungen
      über LDAP-Gruppen.

      Die Anleitung beschreibt eine funktionierende OIDC-Client-Konfiguration für
      Proxmox unter Verwendung des in Nubus integrierten Keycloak-Dienstes. Sie
      kann als Vorlage für die Anbindung weiterer Anwendungen dienen.
    name: Proxmox Anbindung an Univention Nubus über OpenID Connect
