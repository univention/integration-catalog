    long_description: "### itslearning is Europes leading provider for Learning Management\
      \ Systems in K-12\n\nFounded 1999 in Norway, itslearning is a global player\
      \ in EdTech and offers a ready-to-use\nLearning Management System (LMS), tailored\
      \ to the needs of todays changing schools.\nEducational professionals use itslearning\
      \ to deliver curriculum and content with\nthe aim to increase the quality of\
      \ instruction.\n\n### Change Management\n\nitslearning allows to organize and\
      \ communicate within a school - but also above a\nsingle school it allows communication\
      \ between schools, locally or globally. External\npartners like parents, school\
      \ development, teacher training colleges, universities\nor other partners can\
      \ start to collaborate easily. Authorities use itslearning to\nprovide equal\
      \ access within their organization and to give each school a maximum\nof individuality\
      \ at the same time.\n\n### Education - anywhere and from any device!\n\nThe\
      \ core task of the learn-centered LMS is to support the full circle of learning:\n\
      \n- ** Plan:**The planner is the tool used by teacher staff for developing their\
      \ curriculum. Connect standards with lesson content and activities (such as\
      \ tests, assignments or quizzes).\n- ** Activate:** Collaborate in a team, design\
      \ lessons with the highest degree of student autonomy and participation and\
      \ integrate your own or external media or sources (e.g. YouTube, Sofatutor,\
      \ etc.).\n- **Teaching:** Always keep track of your lesson plans and use the\
      \ quality time in the classroom to better help individual students or groups.\
      \ Using tools such as tasks and discussion forums to achieve the best learning\
      \ result for each student.\n- **Assessing:** Tools such as tests, tasks, peer\
      \ assessment etc. can be linked to different evaluation systems, from achieved/not\
      \ achieved to numerical scores or rubrics based on your curriculum strategy.\n\
      - **Reflection:** Numerous feedback functionality between student-teacher, student-student\
      \ as well as teacher-teacher help in classes or in interdisciplinary cooperation\
      \ to increase class and school quality.\n- ** Reporting:** Reporting tools help\
      \ you to be transparent, supportive and organised towards your students - and\
      \ helps students to better assess and improve their own learning.\n\nPlease\
      \ visit the itslearning website for more info.\n\n### **itslearning LMS Connector**\n\
      The itslearning LMS Connector receives user account data (students, teachers,\
      \ staff)\nand group information (classes and work groups) from the UCS directory\
      \ service and\nprocesses these on the UCS system. For user provisioning, a XML\
      \ file containing username,\nbirth date, name, lastname and group is sent via\
      \ SFTP to itslearning. The app also\ncreates a single sign-on via SAML-protocol,\
      \ where no user password is sent to itslearning.  \n\n\n### Request a Demo\n\
      \nJoin the millions around the world using our cloud-based learning platform.\
      \ Click\non the link to try out our product yourself: [https://itslearning.com/request-a-demo#](https://itslearning.com/request-a-demo#)\
      \ \n\n[Terms & Conditions](https://itslearning.com/privacy-commitment/terms)\
      \ | [Privacy Statement](https://itslearning.com/privacy-commitment/data-privacy-policy)\n"
    name: itslearning LMS Connector
    short_description: 'itslearning - Europes Leading Learning Management System for
      Schools

