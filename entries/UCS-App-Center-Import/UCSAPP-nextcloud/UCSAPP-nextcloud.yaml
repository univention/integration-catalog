    long_description: 'If your organization would like the benefits of easy sharing
      and collaboration on

      data online as offered by various cloud vendors but needs to stay in control,
      ensuring

      no unauthorized access, Nextcloud is what you are looking for.


      Nextcloud offers a unique-in-the-industry fully open source solution for on-premise

      data handling and communication with an uncompromising focus on security and
      privacy.


      ## Features


      Nextcloud brings together universal access to data with next-generation secure
      communication

      and collaboration capabilities under direct control of IT and integrated with
      existing

      compliant infrastructure. Nextcloud''s open, modular architecture, emphasis
      on security

      and advanced federation capabilities enable modern enterprises to leverage their

      existing assets within and across the borders of their organization.


      ### Features:



      - Easy web UI and clients for Android, iOS, Windows, Mac and Linux

      - Easy collaboration and sharing files internal and external with optionally
      enforcable password and expiration date

      - Audio/video chat, mail and calendaring as well as collaborative document editing
      (MS Office compatible) fully built in, optional Outlook integration and more

      - External storage support like Windows Network Drive, FTP, WebDAV, NFS and
      more

      - Many passive and active security features like two-factor authentication,
      brute force protection and CSP 3.0 as well as an audit log

      - Optionally server-side encryption (can be chosen per storage) and end-to-end,
      client-side encryption (can be chosen per folder by the user)

      - Full admin control over sharing with File Access Control rules like "DOCX
      can only be downloaded from within local network" or execute actions if certain
      conditions are met (like a tag is set)

      Learn more about [Nextcloud features here](https://nextcloud.com/features) and
      check out our offering [for the education market in particular here.](https://nextcloud.com/education)



      ### Comparison


      Compared to other private cloud solutions, Nextcloud offers stronger security
      measures,

      with two-factor authentication, brute force protection and [many other security
      protections](https://nextcloud.com/secure) built in. It is fully open source
      and the [most active file sync and share project](https://nextcloud.com/blog/nextcloud-the-most-active-open-source-file-sync-and-share-project/)
      being developed.


      Learn about [migrating from other solutions to Nextcloud here.](https://nextcloud.com/migration)


      Nextcloud typically targets organizations from 50 to tens of millions of users
      in

      industries including education, government, legal and financial services and
      manufacturing.

      Customers include SIEMENS, all French universities covered under RENATER, the
      German

      Federal Government and more. Look for [case studies on our website.](https://nextcloud.com/casestudies)

      For more information, visit [nextcloud.com](https://nextcloud.com) or follow
      [@Nextclouders on Twitter](https://twitter.com/nextclouders).

      ## Integration


      Nextcloud is well integrated in UCS, offering easy installation. The automatic
      configuration

      includes:


      - Administrator is automatically Nextcloud admin

      - Users are enabled to access Nextcloud by default

      - Users and Groups can be enabled/disabled in User & Group Settings

      - User quota can be configured in User settings

      - All User and Group benefits by Nextcloud LDAP Schema

      - Web server fully configured and behind stock UCS web server acting as proxy
      and doing all TLS magic


      The Nextcloud app for UCS in Univention App Center is based on thelatest release

      from the Nextcloud stable update channel. Major releasesare typically provided
      in

      the stable update channel within 3-6 monthafter release. The app will then also
      receive

      an update in the App Center.

      '
