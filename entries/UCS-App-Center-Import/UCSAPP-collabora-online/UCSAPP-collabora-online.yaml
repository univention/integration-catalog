    long_description: 'Collabora Online ist ein leistungsstarke LibreOffice basierte
      Online-Office Lösung,

      die alle wichtigen Dokumenten-, Tabellenkalkulations- und Präsentationsdateiformate

      unterstützt, die Sie in Ihre eigene Infrastruktur integrieren können. Hauptmerkmale

      sind die kollaborative Bearbeitung und die hervorragende Unterstützung des Office-Dateiformats.


      Collabora Online ist hervorragend für Unternehmen geeignet, die eine leistungsstarke

      Office-Suite vor Ort benötigen, die ihre Privatsphäre schützt und ihnen die
      volle

      Kontrolle über ihre sensiblen Unternehmensdaten ermöglicht.


      Diese App installiert Collabora Online in Ihre lokale UCS-Umgebung. Sie ermöglicht

      es Ihren Nutzern, Office Dokumente mit ihrem Browser zu bearbeiten. Die App
      integriert

      sich mit ownCloud, Nextcloud und EGroupware und benötigt eine dieser Lösungen
      in

      Ihrer UCS-Umgebung.


      Diese App enthält die **unbeschränkte Vollversion** von Collabora Online. Siehe
      ["Verstehen der Unterschiede zwischen CODE und Collabora Online"](https://www.collaboraonline.com/case-studies/differences-between-code-and-collabora-online/)
      für weitere Details zu den Unterschieden. Die App benötigt einen Lizenzschlüssel.
      Ohne gültigen Lizenzschlüssel werden alle darin geöffneten Dokumente mit einem
      Warnhinweis als Wasserzeichen versehen.


      Die App integriert sich mit ownCloud, Nextcloud und EGroupware und benötigt
      eine

      dieser Apps in der UCS-Umgebung.


      ### Hauptmerkmale


      - Anzeigen und Bearbeiten von Textdokumenten, Tabellenkalkulationen, Präsentationen
      & mehr

      - Erhaltung von Layout und Formatierung in Dokumenten (WYSIWYG)

      - Kollaborative Bearbeitung

      - Live-Benachrichtigungen von Benutzern, die eintreten oder beenden

      - Einfügen, Bearbeiten und Beantworten von Kommentaren

      - Änderungen verfolgen

      - Vollbildpräsentation

      - Admin-Konsole zur Überwachung der Systemauslastung

      - WOPI (Web Application Open Platform Interface) Protokoll für die Kommunikation
      mit Ihrer Webanwendung (Authentifizierung und Dateiübertragung)

      '
