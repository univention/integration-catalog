    long_description: "Data protection-compliant device management for schools, public\
      \ authorities, administrations\nand companies   \n\n \n\nRelution is a mobile\
      \ device management solution (MDM) developed in Germany that can\nbe used to\
      \ inventory, configure, equip and secure all digital devices - regardless\n\
      of operating system, type and manufacturer. The platform-independent offering\
      \ also\nsupports trouble-free mixed operation of deployed devices. In addition,\
      \ apps and\ncontent can be intuitively manage and control digital devices, apps\
      \ and content.\nThis way, devices are optimally controlled and managed.  \n\
      \   \nFor the convenient mass enrollment of devices and the procurement and\
      \ distribution\nof app licenses, Relution supports the offerings of Apple (DEP,\
      \ VPP, Apple Classroom),\nAndroid Enterprise (ZeroTouch, Managed Google Play\
      \ Store), Samsung (KNOX, KME, Samsung\nClassroom Management) and Microsoft (Autopilot)\
      \ - this limits administrative efforts,\nrealizes synergy effects and reduces\
      \ costs.   \n\nThe MDM system ensures that all end devices are up to date and\
      \ running smoothly in\nschools, public authorities, administrations and companies\
      \ by means of central and\nuniform remote management. In this way, devices are\
      \ optimally prepared for use and\ncan be deployed specifically for their intended\
      \ purpose. Relution enables data protection-compliant\noperation at any time,\
      \ either in the company's own infrastructure or in a European\ncloud (on premises).\
      \  \n\nTo protect sensitive data, the devices can also be used without the use\
      \ of personal\ncloud IDs. The connection to the UCS Idm system is automatic.\
      \ In addition, Relution\nsupports common server solutions. By connecting existing\
      \ systems, local file shares\ncan be integrated for access to relevant content\
      \ and data as well as work results\ncan be stored securely on the central server.\
      \  \n   \nEspecially for educational institutions, all common application scenarios\
      \ can be\nimplemented quickly and easily with Relution. The intuitive Relution\
      \ Teacher App\nand the Relution Shared Device Mode support trouble-free and\
      \ privacy-compliant teaching\nwith pedagogically useful apps. In addition to\
      \ the management of school-owned devices,\nthe use of parent-funded or private\
      \ student devices (BYOD) is also possible. Thanks\nto the integrated lending\
      \ system, the school or school board can keep track at all\ntimes of to whom\
      \ and until when loaned devices have been issued.  \n\n\n"
    name: Relution
    short_description: 'Data protection-compliant device management for schools, public
