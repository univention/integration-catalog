    long_description: '[Microsoft 365 - auf Ihr Unternehmen zugeschnitten](https://products.office.com/en/business/).


      Der Microsoft 365 Connector für Nubus ermöglicht es, einen Office Zugang mit
      Single-Sign-On

      für Nutzerkonten aus dem Univention Nubus IAM von UCS zu provisionieren. Durch
      Verwenden

      der Nubus Identitymanagement Features werden ausgewählte Nubus Nutzerkonten
      automatisch

      dem Microsoft 365 Azure Account hinzugefügt, aktualisiert oder gelöscht.


      Benutzer melden sich mit ihrem Nubus Benutzernamen und Passwort an und können
      sofort

      die Microsoft 365 Features nutzen. Durch das Einbinden des Keycloak basierten
      Single-Sign-On

      von Nubus für den Login verlässt das Benutzerpasswort niemals die Nubus Domäne

      von UCS.


      Diese App ist für Organisationen geeignet, die den in Nubus für UCS gemanagten

      Nutzern Zugriff auf die Funktionen von Microsoft 365 oder die damit verbundenen
      Lizenzen

      für Microsoft Office Desktop Software geben wollen. Um den Connector in Betrieb

      zu nehmen, ist ein Azure Active Directory und eine Microsoft 365 (Test-)Subskription

      erforderlich.

      '
    name: Microsoft 365 Connector
    short_description: 'Single-Sign-On in Microsoft 365 für Nubus Benutzer

      '
