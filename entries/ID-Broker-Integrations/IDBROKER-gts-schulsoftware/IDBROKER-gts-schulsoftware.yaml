    long_description: |
      GTS Schulsoftware by ivPRO GmbH is a specialised administration software
      for all-day schools (Ganztagsschulen). Developed over more than 10 years,
      the solution supports schools and school operators in managing all-day
      operations.

      ## Features

      - **GTS** – Administration software for individual all-day schools:
        booking system, absence management, parent portal for sick notes
        and early departures
      - **GTSPro** – For operators of multiple all-day schools:
        management and billing towards parents, overview of all connected
        schools
      - Hosted in a German data centre with SSL encryption
      - Daily automated backups
      - GDPR-compliant data processing

      ## Integration with UCS@school

      GTS Schulsoftware is connected to UCS@school via the Univention ID Broker.
      Teachers and administrative staff can log in with their UCS@school
      credentials using Single Sign-On.
