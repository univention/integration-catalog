        URL: https://www.taskcards.de/
    long_description: |
      TaskCards ist eine DSGVO-konforme digitale Pinnwand für den Unterricht,
      die speziell für den deutschen Bildungsbereich entwickelt wurde. Mit
      TaskCards können Lehrkräfte und Schüler*innen kollaborativ digitale
      Inhalte erstellen, teilen und gemeinsam bearbeiten.

      ## Funktionen

      - Digitale Pinnwände für kollaboratives Arbeiten im Unterricht
      - Verschiedene Kartentypen: Text, Bild, Video, Audio, Links, Aufgaben
      - DSGVO-konform, Server in Deutschland
      - Keine Registrierung für Schüler*innen erforderlich
      - Einfache Freigabe via Link oder QR-Code
      - Integration in gängige Lernmanagementsysteme

      ## Integration mit UCS@school

      TaskCards ist über den Univention ID Broker an UCS@school angebunden.
      Schüler*innen und Lehrkräfte können sich mit ihrem UCS@school-Benutzerkonto
      per Single Sign-On bei TaskCards anmelden.
    name: TaskCards
    short_description: DSGVO-konforme digitale Pinnwand für den Unterricht
