  en-US:
    icon: audriga-groupware-migration_logo.svg
    keywords:
    - Collaboration
    - ''
    links:
    - Description: ''
      URL: ''
    long_description: 'The audriga Groupware Migration Service allows migrating emails,
      contacts and calendar

      items from other servers or hosting offerings to UCS. This application will
      install

      a link to the Migration Service platform, where the migration can be configured
      and

      started. The service connects via standard protocols (IMAP, EWS, CardDAV, CalDAV),

      which have to be accessible via the Internet. All commonly used IMAP servers
      are

      supported. Contacts and calendar items are only supported for MS Exchange, Open-Xchange

      and Kolab in self-service. For other platforms, please contact audriga.

      '
    name: audriga Groupware Migration Service
    short_description: 'Self-service for migrating email and groupware accounts

      '
    tags: []
    visuals:
    - thumbnail_1.png
