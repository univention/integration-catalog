    long_description: "Collabora Online is a powerful LibreOffice-based online office\
      \ that supports all\nmajor document, spreadsheet and presentation file formats,\
      \ which you can integrate\nin your own infrastructure. Key features are collaborative\
      \ editing and excellent\noffice file format support.\n\nCollabora Online is\
      \ excellent for enterprises that need a powerful office suite on-premise,\n\
      that protects their privacy and allows them to keep full control of their sensitive\n\
      corporate data.\n\nThis app installs Collabora Online into your local UCS environment.\
      \ It enables your\nusers to edit office documents with their browser. It integrates\
      \ with ownCloud, Nextcloud\nand Egroupware and requires one of these apps in\
      \ your UCS environment.\n\nThis app contains the **unrestricted full version**\
      \ of Collabora Online. See [\"Understanding the differences between CODE and\
      \ Collabora Online\"](https://www.collaboraonline.com/case-studies/differences-between-code-and-collabora-online/)\
      \ for more details in the differences. The app requires a license key. Without\
      \ a valid license key, all documents opened in it will display a warning text\
      \ as a watermark.\n\nKey Features  \n\n\n- View and edit text documents, spreadsheets,\
      \ presentations & more\n- Preservation of layout and formatting of documents\
      \ (WYSIWYG)\n- Collaborative editing\n- Live notifications of users entering\
      \ or exiting\n- Insert, edit and reply to comments\n- Change Tracking\n- Full\
      \ screen presentation\n- Admin console for monitoring system utilization\n-\
      \ WOPI (Web Application Open Platform Interface) protocol for communication\
      \ with your web application (authentication and file transfer)\n"
    name: Collabora Online
    short_description: 'Powerful LibreOffice-based online office suite

      '
