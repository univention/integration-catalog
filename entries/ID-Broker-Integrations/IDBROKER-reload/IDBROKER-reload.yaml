    long_description: |
      ReLoAd (Ressourcen für Lernende und Lehrende auf Abruf digital) ist ein
      digitales Bildungsangebot, das Lernressourcen für Schüler*innen und
      Lehrkräfte bereitstellt. Das Projekt bietet digital aufbereitete Inhalte
      zum Abruf für den Unterricht.

      ## Integration mit UCS@school

      ReLoAd ist über den Univention ID Broker an UCS@school angebunden.
      Schüler*innen und Lehrkräfte können sich mit ihrem UCS@school-Benutzerkonto
      per Single Sign-On bei ReLoAd anmelden.
