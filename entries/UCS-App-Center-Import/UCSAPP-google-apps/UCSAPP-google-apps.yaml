    long_description: "With the app \"Google Workspace Connector\" (Business & Education)\
      \ you\noffer users of UCS and UCS@school in your organization a comfortable\
      \ single sign-on\naccess to Gmail, Google-Docs, -Drive and -calendar in the\
      \ Google Cloud. At the same\ntime, the identities of your users remain in your\
      \ own IT and you retain full control\nover them.  \n\n## Managing Google Workspace\
      \ Access with Nubus Identity Management\nThe Google Workspace Connector uses\
      \ the Nubus identity Management features,\nthereby enabling  users to access\
      \ [Google’s services](https://gsuite.google.com/) with single sign-on. The administrator\
      \ determines which users are automatically added, updated or deleted from Google\
      \ Workspace. This works for both the Business and the Education version.  \n\
      By using the Nubus single sign-on for the login, the user password never leaves\
      \ the\nNubus on UCS domain, so that your sensitive access data remains under\
      \ your control\nand you have a security advantage .   \nThe central license\
      \ management is also helpful, as it makes it easy for the IT administrator\n\
      to keep an eye on licenses and license costs at all times.  \n\n## Single sign-on\
      \ - Simple access to Google Workspace for your users\nAfter you have authorized\
      \ a user to use Google Workspace, he logs into the Nubus\nPortal of UCS as usual\
      \ with his Nubus  user name and password, is redirected\nto Google Workspace\
      \ and can use the Google Collaboration features. This eliminates\nthe need for\
      \ users to create and manage their own Google Accounts.  \nThe \"Google Workspace\
      \ Connector\" app is suitable for organizations\nthat want to use Google Workspace\
      \ but also want to manage their users with Nubus.  \nA Google Workspace (test)subscription\
      \ is required for the connector to become\noperational.\n"
    name: Google Workspace Connector
    short_description: 'Single Sign-On to Google Workspace for users of Nubus on UCS

      '
