    visuals:
    - ''
  en-US:
    icon: ''
    keywords:
    - ''
    - Identity Management
    - Infrastructure
    links:
    - Description: ''
      URL: ''
    long_description: "The UCS Intercom Service (ICS) is a backend service that acts\
      \ as an intermediary\nfor the secure communication and Single Sign-On between\
      \ other services. The ICS allows\nwebservice backends to communicate with each\
      \ other based on the Single Sign-On session\nof the current end user while ensuring\
      \ session security.\n\n\nThe ICS is very specific for dedicated use cases, currently\
      \ in the interaction between\nOpen-Xchange, Nextcloud and elements/matrix. Details\
      \ are outlined in the documentation.  \n\nThe App can only be installed successfully\
      \ if some prerequisites are fullfilled.\n**Please consult the [documentation](https://docs.software-univention.de/intercom-service/latest/)\
      \ before installation!**  \n   \n"
    name: UCS Intercom Service
    short_description: 'Single Sign-On helper service for secure backend communication.

      '
