    long_description: "Are you looking for a flexible and free collaboration solution\
      \ as an alternative\nto Microsoft 365 or Google Workspace? EGroupware is the\
      \ Smart Online Office for the\nweb browser from EGroupware GmbH in Kaiserslautern/Germany:\
      \ open source, GDPR-compliant,\nadaptable and expandable - with professional\
      \ support on request\n\n## Functions and features\n\nEGroupware is a complete\
      \ groupware solution, modular and expandable. In addition\nto its own developments,\
      \ the Smart Online Office also integrates partner products\nand proven open\
      \ source applications from other manufacturers.\n\nEGroupware contains everything\
      \ that SMEs (small and medium-sized enterprises), city\nadministrations or even\
      \ educational and research institutions need for their daily\nwork:\n\n- [File\
      \ manager](https://www.egroupware.org/documents), [Email](https://www.egroupware.org/email),\
      \ [Calendar](https://www.egroupware.org/calendar), [Contacts](https://www.egroupware.org/contacts)\n\
      - [Project management tool](https://www.egroupware.org/projects), [Time recording](https://www.egroupware.org/timesheet),\
      \ [Task planner](https://www.egroupware.org/tasks), [Kanban board](https://www.egroupware.org/kanban)\n\
      - [Integrated office suite](https://www.egroupware.org/online-office) (Collabora\
      \ Online), use data from EGroupware/placeholders in documents\n- [File sharing](https://www.egroupware.org/documents)\
      \ (with open and hidden releases for users/groups) \n- [Contact sharing](https://www.egroupware.org/contacts)\
      \ (internal/external, with/without write access and file manager access)  \n\
      \n- [Customer management](https://www.egroupware.org/crm) (CRM) and [Helpdesk](https://www.egroupware.org/helpdesk)\n\
      - Create, import, view and print [Invoices](https://www.egroupware.org/en/e-invoice)\
      \ in both XRechnung (XML format) and ZUGFeRD (hybrid PDF/XML) formats.\n- [Video\
      \ chat/conference](https://www.egroupware.org/videoconferences), [Chat](https://www.egroupware.org/chat)\
      \ and desktop sharing (Jitsi, BigBlueButton, Rocket.Chat)\n- Video-based learning\
      \ application: [VIDOTEACH](https://www.vidoteach.de) interacts very well with\
      \ other learning management systems thanks to LTI (Learning Tools Interoperability)\n\
      - Responsive design with full support for mobile devices from 5\" upwards\n\
      - [Telephony integration](https://www.egroupware.org/cti-telefon-integration)\
      \ (CTI), pairing of telephones (softphones, desk phones) and computers/smartphones\n\
      - Import/export and [Synchronisation](https://www.egroupware.org/synchronisation)\
      \ of data (ActiveSync, Card/Cal/WebDAV)\n- Integration of external resources\
      \ in the file manager (SMB, WebDAV, NFS, etc.)\n- Application firewall with\
      \ access limits, brute force protection, 2FA and login rules\n- Open interfaces\
      \ and [REST API](https://github.com/EGroupware/egroupware/tree/master/doc/REST-CalDAV-CardDAV#rest-api-using-egroupware-caldavcarddav-server-with-json)\
      \ that enable and facilitate the implementation of own applications or external\
      \ systems such as ERP\n- Integration of further products and web applications\
      \ easily possible; connection via OpenID/OAuth2 server to the existing user\
      \ administration\n- Contract development and adaptation to own infrastructure\
      \ by the manufacturer possible\n\nWith user-defined fields, mask changes, own\
      \ information types address book/InfoLog\nand diverse authorisation possibilities\
      \ up to the development/operation of own applications,\nEGroupware can be extensively\
      \ adapted to one's own requirements.  \n\n\nThe free Community Edition (CE)\
      \ contains all basic functions; the Enterprise Line\n(EPL) comes with additional\
      \ features and applications, extended support and functions\nthat are particularly\
      \ interesting for companies, small and large organisations -\nregardless of\
      \ whether 10 or several thousand users work with it. Discounts for NGOs/educational\n\
      institutions are available on [request](https://www.egroupware.org/contact).\n\
      \n## Installation and operation\n\nThe EGroupware app is very well integrated\
      \ into Univention Corporate Server, easy\nto install and connected to the user/group\
      \ administration and the mail server. The\nautomatic configuration of the app\
      \ sets up the following:\n\n- The UCS administrator is the EGroupware administrator.\n\
      - All UCS users can use EGroupware if administrators set the appropriate access\
      \ rights.\n- EGroupware uses UCS as a reverse proxy and is secured via SSL.\n\
      \nOnce a year, the manufacturer releases a major update; in addition, approximately\n\
      8 to 10 updates are released annually with fixes and new features. The UCS version\n\
      of the groupware solution goes through additional tests and usually appears\
      \ a few\ndays after the version published by the manufacturer.\n\nThe app installs\
      \ the EPL version of EGroupware with a 30-day trial licence. After\nthe 30 days\
      \ have expired, customers can purchase an EPL licence from the manufacturer\n\
      or continue to operate their installation as a Community Edition.  \nSince EGroupware\
      \ version 21.1.20210923 it is possible to run the community version\nof EGroupware\
      \ on a Univention Corporate Server (UCS). The changeover to the community\n\
      version is documented in the [forum](https://help.egroupware.org/t/de-uk-egroupware-community-edition-auf-on-ucs/76311).\
      \  \n\n\nAlternatively, the manufacturer offers EGroupware as an installation\
      \ package for\nvarious Linux distributions or as a hosted SaaS solution in German\
      \ data centres,\nwhich you can also connect to an existing UCS domain. Furthermore,\
      \ it is possible\nto migrate the hosted SaaS solution to an on-premises UCS.\n\
      \n## Additional information\n\nA complete list of all features and functions\
      \ is presented on the [EGroupware website](https://www.egroupware.org/). In\
      \ addition to professional support from the manufacturer, there is support from\
      \ the community: Discuss with other users and EGroupware developers in the multilingual\
      \ [forum](https://help.egroupware.org/). The manufacturer publishes announcements\
      \ and news in the forum and on [GitHub](https://github.com/EGroupware)/[Mastodon](https://fosstodon.org/@EGroupware)/[Bluesky](https://bsky.app/profile/egroupware.org)/[Linkedin](https://www.linkedin.com/company/egroupware-gmbh)/[Facebook](https://www.facebook.com/EGroupware).\
      \ Numerous presentations and recordings of webinars can be found on the [EGroupware\
      \ YouTube channel](https://www.youtube.com/user/EGroupware).\n"
