    long_description: 'Die App installiert den Software-Monitor. Das ist eineDatenbank,
      in der Informationen

      über die  installierten Softwarepakete aufUCS-Systemen aufgezeichnet werden.
      Über

      ein Modul im UCS-Managementsystem kannein Administrator die Datenbank abfragen
      und

      sich so einen Überblickverschaffen, welche Release- und Paketversionen auf den
      Systemen

      der Domäneinstalliert sind. Ein Administrator kann damit bei der schrittweisenAktualisierung

      einer UCS-Domäne sehr einfach Installationsprobleme erkennen.UCS-Systeme aktualisieren

      ihre Einträge in der Datenbank bei der Installation,Entfernung und Aktualisierung

      von Software automatisch.

      '
    name: Software-Installationsmonitor
    short_description: 'Zentraler Monitor für Software und -status auf UCS-Systemen

      '
