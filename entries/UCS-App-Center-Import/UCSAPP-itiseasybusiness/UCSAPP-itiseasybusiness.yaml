    long_description: 'Unsere Lösung ITISeasy.business, basiert auf der quelloffenen
      Open Source Lösung

      odoo Community und ist auf Basis unserer langjährigen Erfahrung in der Projektarbeit

      bzw. der Einführung von ERP-Systemen bei Unternehmen, sowie unserer Produktentwicklung,

      zu einer Lösung mit Mehrwert gereift. Diese Erfahrung und Verbesserung möchten

      wir mit ITISeasy.business als Komplettpaket an unsere Kunden weitergeben, um
      eine

      gesamtheitliche Lösung zu erhalten und in der Einführung eines ERP-Systems auf

      kundenspezifische Anpassungen soweit wie möglich verzichten zu können.


      ITISeasy.business ist ein vollwertiges Business-System, und durch sein vielseitiges,

      modulares Konzept weit mehr ist als ein normales ERP-System. Es unterstützt
      Sie

      mit einem präzisen Geschäftsablauf, der dennoch einfach zu verwalten und selbsterklärend

      ist. Damit können Ihre Mitarbeiter, Partner und Sie selbst die Kontrolle über
      Ihr

      Unternehmen übernehmen und erhalten die notwendigen Informationen, um in die
      richtige,

      zukunftsorientierte Richtung zu steuern.


      Durch den modularen Aufbau von ITISeasy.business, ist die Software für jede
      Branche

      und Unternehmensgröße bestens geeignet.


      ITISeasy.business ist mit einer Reihe von Erweiterungen ausgestattet, die speziell

      für den europäischen Markt elementar und sinnvoll sind. Besonders hervorzuheben

      ist das einzigartige Vertragswesen (ITISeasy.business contract), das Management
      Dashboard,

      die große Verbesserung für ITISeasy.business Projects, der User-Helpdesk und
      Ticketing

      (ITISeasy.business support), aber auch die vollständige Personallösung mit ITISeasy.business

      Anwesenheit, ITISeasy.business Timesheet (Zeitbuchungen), ITISeasy.business
      Urlaubsplanung,

      und Schichtplan-Verwaltung. Last but not least haben wir auch die Finanzbuchhaltung

      um wichtige Funktionen wie das Mahnwesen und Berichtswesen so ergänzt, dass
      Sie

      damit wirklich gleich loslegen können.


      Über das Univention App Center erhalten Sie die kostenlose ITISeasy.business
      (UE),

      die bereits eine Vielzahl an Verbesserungen gegenüber odoo enthält. Sollten
      Sie

      für Ihr Unternehmen den vollen Umfang von ITISeasy.business benötigen, können

      Sie die reichhaltige Vollversion (Nutzungsentgeldpflichtig) freischalten lassen.

      '
    name: odoo enhanced ITISeasy.business (UE)
    short_description: 'ITISeasy.business - die verbesserte ERP-Lösung

      '
