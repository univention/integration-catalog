    long_description: |
      Community documentation for connecting Proxmox to Univention Nubus via
      OpenID Connect (OIDC), including control of login permissions through
      LDAP groups.

      The guide describes a working OIDC client configuration for Proxmox using
      the Keycloak service integrated in Nubus. It can serve as a template for
      connecting other applications to Nubus.
    name: Proxmox integration with Univention Nubus via OpenID Connect
