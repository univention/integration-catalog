    long_description: "The Nubus Demo Data app loads example data for user accounts,\
      \ user groups, client\nsystems and organizational units into the Nubus directory\
      \ service of UCS. This app\nis especially suiteable for environments, that are\
      \ operated for testing or demonstration\npurposes. An organization structure\
      \ with several locations is set up and users, groups\nand computers are created.\
      \ Existing objects for users, groups and computers are left\nunchanged.\n\n\
      The app and the provided user data can be used without limits. The user objects\
      \ have\nphotos included. The photos are from [Free Digital Photos](http://freedigitalphotos.net).\
      \  \n\nPlease note that this app is not covered by Univention support. However,\
      \ the community\nis available at [help.univention.com](https://help.univention.com/)\
      \ to assist you with any questions. If you have any questions concerning your\
      \ support coverage, please do not hesitate to contact your contact partner at\
      \ Univention.\n"
