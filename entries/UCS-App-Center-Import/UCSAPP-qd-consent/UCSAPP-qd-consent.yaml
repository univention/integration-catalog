    long_description: "QD Consent ist eine App für UCS, die die Einwilligung zur Datenübertragung\
      \ persönlicher\nDaten an Microsoft365 und den jeweils gültigen Nutzungsbedingungen\
      \ automatisiert.\n\n\nSchüler und Lehrer können mit dieser App selbstständig\
      \ ihre Einwilligungen geben\n- ein aufwändiges Management z.B. durch Fragebögen\
      \ oder Hinterlegung in ein\nSchulverwaltungsprogramm z.B. durch das Sekretariat\
      \ oder Lehrer entfällt somit.\n\n\nAdministratoren können dabei die Einwilligungen\
      \ von Nutzern bequem abrufen und in\nverschiedenen Formaten sichern.  \n\nApp\
      \ Dokumentation: [https://qua-dev.com/qd-consent](https://qua-dev.com/qd-consent)\
      \  \n   \nZum vollumfängliche Betrieb dieser App ist eine Lizenzierung notwendig.\
      \  \nFalls keine Lizenz vorhanden ist, wird automatisch eine Trial-Lizenz genutzt.\
      \  \n    \nNach Installation dieser App kann sich der Admin wie unter  [https://qua-dev.com/qd-consent#3-2_admin-user](https://qua-dev.com/qd-consent#3-2_admin-user)\
      \ beschrieben einloggen und die App weiter einrichten. \n\n\n"
