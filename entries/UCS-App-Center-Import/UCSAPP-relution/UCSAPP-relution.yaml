    long_description: "**Datenschutzkonformes Gerätemanagement für Schulen, Behörden,\
      \ Verwaltungen und\nUnternehmen**\n\n \n\nRelution ist eine in Deutschland entwickelte\
      \ Mobile-Device-Management-Lösung (MDM),\nmit der sämtliche digitale Endgeräte\
      \ inventarisiert, konfiguriert, ausgestattet\nund abgesichert werden können\
      \ – unabhängig von Betriebssystem, Typ und Hersteller.\nDas plattformunabhängige\
      \ Angebot unterstützt auch einen problemlosen Mischbetrieb\neingesetzter Geräte.\
      \ Zudem lassen sich Apps und Inhalte intuitiv steuern und verwalten.  \n   \n\
      Für die komfortable Masseneinschreibung von Geräten und Beschaffung sowie Verteilung\n\
      von App Lizenzen unterstützt Relution die Angebote von Apple (DEP, VPP, Apple\
      \ Classroom),\nAndroid Enterprise (ZeroTouch, Managed Google Play Store), Samsung\
      \ (KNOX, KME, Samsung\nClassroom Management) und Microsoft (Autopilot) – dies\
      \ limitiert administrative\nAufwände, realisiert Synergieeffekte und senkt Kosten.\n\
      \n \n\nDas MDM-System stellt durch eine zentrale und einheitliche Fernverwaltung\
      \ die Aktualität\nund Lauffähigkeit aller Endgeräte für einen reibungslosen\
      \ Ablauf in Schulen, Behörden,\nVerwaltungen und Unternehmen sicher. So sind\
      \ Geräte optimal für die Benutzung vorbereitet\nund lassen sich gezielt für\
      \ den jeweiligen Verwendungszweck einsetzen. Relution\nermöglicht dabei einen\
      \ jederzeit datenschutzkonformen Betrieb, wahlweise in der\neigenen Infrastruktur\
      \ oder in einer deutschen Cloud (on Premises).  \n\nZum Schutz sensibler Daten\
      \ ist die Nutzung der Geräte auch ohne Verwendung von persönlichen\nCloud-IDs\
      \ möglich. Die Anbindung an das IdM-System von UCS erfolgt automatisch.\nZusätzlich\
      \ unterstützt Relution gängige Serverlösungen. Durch die Anbindung bestehender\n\
      Systeme lassen sich lokale Dateifreigaben für den Zugriff auf relevante Inhalte\n\
      integrieren und Daten und Arbeitsergebnisse können sicher auf dem zentralen\
      \ Server\nabgelegt werden.   \n \n\nDas plattformunabhängige Angebot unterstützt\
      \ den übergreifenden Einsatz der gängigen\nBetriebssysteme von Apple (iOS, iPadOS,\
      \ macOS, tvOS), Android (Enterprise, Classic)\nund Windows und ermöglicht einen\
      \ Mischbetrieb eingesetzter Geräte. \n\n \n\nSpeziell für Bildungseinrichtungen\
      \ lassen sich mit Relution alle gängigen Anwendungsszenarien\nschnell und unkompliziert\
      \ umsetzen. Die intuitive Relution Teacher App und der Relution\nShared Device\
      \ Modus unterstützen einen störungsfreien und datenschutzkonformen\nUnterricht\
      \ mit pädagogisch sinnvollen Apps. Neben der Verwaltung von schuleigenen\nGeräten\
      \ ist auch die Nutzung von elternfinanzierten oder privaten Schülergeräten\n\
      (BYOD) möglich. Dank integriertem Ausleihsystem behalten die Schule oder Schulträger\n\
      zu jederzeit die Übersicht, an wen und bis wann Leihgeräte ausgegeben sind.\
      \  \n\n"
