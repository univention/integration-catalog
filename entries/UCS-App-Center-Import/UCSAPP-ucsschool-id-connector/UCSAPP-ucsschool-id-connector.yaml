    long_description: 'Der UCS@school ID Connector verbindet ein UCS@school-Verzeichnis
      mit beliebig vielen

      weiteren UCS@school-Verzeichnissen (1:n).


      Er ist konzipiert, um Landesverzeichnisse mit Schul- oder Schulträgerinstanzen
      zu

      verbinden, kann aber grundsätzlich auch in anderen Kontexten verwendet werden.
      In

      jedem Fall sollte vor der Verwendung bitte zunächst mit dem Univention-Team
      Kontakt

      aufgenommen werden.


      Die Verbindung findet unidirektional statt, dass heißt es werden Benutzerdaten
      (Benutzer,

      Schulzugehörigkeit, Klassenzugehörigkeiten) aus einem zentralen Verzeichnis
      (z.B.

      Landesverzeichnis) an Schulträger- und Schulverzeichnisse übertragen.


      Schulträger- und Schulen werden damit in die Lage versetzt, autonom schulische
      IT-Infrastruktur

      anzubieten und sich dabei keine Gedanken mehr über die Benutzerpflege machen
      zu

      müssen.


      Voraussetzung ist der Einsatz der UCS@school Kelvin API auf den entfernten Schul-

      und Schulträgerinstanzen.


      Die lokalen Benutzer werden in Echtzeit an die entfernten Instanzen synchronisiert.


      Hierfür ist vorab eine Konfiguration notwendig, um eine Zuordnung "Welche Schulbenutzer

      sollen an welche entfernte Instanz übertragen werden?" zu erstellen. Dann werden

      diese Benutzer dort angelegt, aktualisiert sowie gelöscht.


      Weitere Informationen zur Architektur und Konfiguration siehe UCS@school ID
      Connector

      Readme.


      Diese App ist Teil von UCS@school und damit Teil der UCS@school-Subskription.

      '
    name: UCS@school ID Connector
    short_description: 'Unidirektionale Synchronisierung zwischen UCS@school-Instanzen

      '
