    long_description: "Die Nubus Demo Data App lädt Beispieldaten für Benutzerkonten,\
      \ Benutzergruppen,\nClientsysteme und Organisationseinheiten in den Nubus Verzeichnisdienst\
      \ von UCS.\nDiese App eignet sich insbesondere für Umgebungen, die zu Test-\
      \ oder Demonstrationszwecken\nbetrieben werden. Dabei werden eine Unternehmensstruktur\
      \ mit verschiedenen Standorten\nabgebildet und hierfür Benutzer, Gruppen und\
      \ Computer angelegt. Bestehende Objekte\nzu Benutzern, Gruppen und Computern\
      \ bleiben dabei unverändert.\n\nDie App und die bereitgestellten Benutzerdaten\
      \ können uneingeschränkt genutzt werden.\nDie Benutzerobjekte verfügen über\
      \ Fotos. Sie stammen von [Free Digital Photos](http://freedigitalphotos.net).\
      \  \n\nBitte beachten Sie, dass diese App nicht vom Univention-Support abgedeckt\
      \ ist. Jedoch\nsteht Ihnen die Community auf [help.univention.com](https://help.univention.com/)\
      \ bei Ihren Fragen zur Verfügung. Bei Fragen zu Ihrer Support-Abdeckung, kontaktieren\
      \ Sie gerne Ihren Ansprechpartner bei Univention.\n"
    name: Nubus Demo Data
    short_description: 'Beispieldaten für Benutzer, Gruppen, Computer

