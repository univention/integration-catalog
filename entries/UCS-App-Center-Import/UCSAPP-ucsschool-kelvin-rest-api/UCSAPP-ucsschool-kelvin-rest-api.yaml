  en-US:
    icon: logo.svg
    keywords:
    - ''
    - Education
    - Identity Management
    - Infrastructure
    links:
    - Description: ''
      URL: ''
    long_description: "This app installs a REST API to manage UCS@school objects.\
      \ For example schools, roles,\nclasses and users can be queried, modified and\
      \ deleted.\n\nIt is a docker app, which in the background use the „[UDM REST\
      \ API](https://www.univention.de/blog-de/2019/07/udm-rest-api-betaversion-veroeffentlicht/)“.\n\
      \nThis UCS@school Kelvin REST API can be used to address the directory service\
      \ via\nnetwork interface. For example from a student information system or from\
      \ other educational\nservices.\n\nThe target group for addressing the API are\
      \ developers. The app can be used by any\nservice that can work with REST APIs\
      \ (e.g. an educational service).\n\nAfter installation of the app a README is\
      \ available at:  \nhttps://example.com/ucsschool/kelvin/v1/readme  \nThe end\
      \ point at https://example.com/ucsschool/kelvin/v1  \nThe authentication at\
      \ the API is done via dynamically generated bearer tokens. For\nmore information\
      \ and documentation, refer to the UCS@school [developer documentation](https://docs.software-univention.de/ucsschool-kelvin-rest-api/index.html)\
      \ or visit https://example.com/ucsschool/kelvin/v1/docs\n\nThe API itself is\
      \ included in the UCS@school support.\n"
    name: UCS@school Kelvin REST API
    short_description: 'REST API to query individual UCS@school objects

      '
    tags: []
    visuals:
    - ''
