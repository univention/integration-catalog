    links:
    - Description: ''
      URL: ''
    long_description: 'Benno MailArchiv ist die offene und flexible Lösung für die
      revisionssichere E-Mail-Archivierung.

      Der Einsatz von Benno MailArchiv ermöglicht signifkante Kosteneinsparungen beim

      Ablegen und Suchen von E-Mails im Unternehmen. E-Mails werden automatisch, sicher

      und zuverlässig archiviert. Die Textinhalte aller E-Mails (incl. der Attachements!)

      werden on the fly indexiert. Alle E-Mails sind damit Volltext suchbar (bspw.
      über

      den Mailtext, Absender, Empfänger, Betreffzeile, Mailheader und natürlich über

      die Inhalte der Attachements!). Benno MailArchiv unterstützt z.Z. ca. 1.300
      verschiedene

      Dateiformate für Attachements. (ZIP-Dateien werden ausgepackt und dateiweise
      indexiert).

      Über die ausgefeilte Suchfunktion wird jede beliebige E-Mail in Sekunden treffsicher

      gefunden. Das Suchen und Anzeigen von E-Mails kann über die http-Schnittstelle
      (REST

      API) als Web-Service in Drittanwendungen integriert werden. Benno MailArchiv
      ist

      damit bestens für die Integration in Geschätsprozesse (SOA) vorbereitet.

      '
    name: Benno MailArchiv
    short_description: 'Automatische und revisionssichere Archivierung von E-Mails

      '
    tags: []
    visuals:
    - thumbnail_2.png
  en-US:
    icon: benno-mailarchiv_logo.svg
    keywords:
