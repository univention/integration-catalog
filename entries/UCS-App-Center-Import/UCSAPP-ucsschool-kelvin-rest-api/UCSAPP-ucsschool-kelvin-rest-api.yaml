    long_description: "Diese App installiert eine REST API zur Verwaltung von UCS@school-Objekten.\
      \ Beispielsweise\nSchulen, Rollen, Klassen und Benutzer können abgefragt, modifiziert\
      \ und gelöscht\nwerden.\n\nEs ist eine Docker-App, die im Hintergrund die „[UDM\
      \ REST API](https://www.univention.de/blog-de/2019/07/udm-rest-api-betaversion-veroeffentlicht/)“\
      \ anspricht.\n\nDiese UCS@school Kelvin REST API dient dazu den Verzeichnisdienst\
      \ per Netzwerkschnittstelle\nansprechen zu können. Beispielsweise von einer\
      \ Schulverwaltungssoftware, aus einer\nLandesverwaltung oder von einem Bildungsangebot.\n\
      \nZielgruppe für das ansprechen der API sind Entwickler. Nutzen kann die App\
      \ jeder\nDienst der mit REST APIs arbeiten kann (z.B. ein Bildungsangebot).\n\
      \nNach Installation der App befindet sich eine README unter:  \nhttps://example.com/ucsschool/kelvin/v1/readme\
      \  \nDer Endpunkt unter https://example.com/ucsschool/kelvin/v1  \nDie Authentifizierung\
      \ an der API erfolgt über dynamisch generierte Bearer-Token.\nWeitere Informationen\
      \ und die Dokumentation finden Sie in der UCS@school [Entwicklerdokumentation](https://docs.software-univention.de/ucsschool-kelvin-rest-api/index.html)\
      \ oder unter https://example.com/ucsschool/kelvin/v1/docs\n\n\nDie API selbst\
      \ ist im UCS@school Support enthalten.\n"
    name: UCS@school Kelvin REST API
    short_description: 'REST-Schnittstelle für Einzelabfrage von UCS@school-Objekten

      '
