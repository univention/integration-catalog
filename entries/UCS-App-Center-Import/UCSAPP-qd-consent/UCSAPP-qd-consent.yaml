    long_description: "QD Consent is an app for UCS that automates consent to the\
      \ data transfer of personal\ndata to Microsoft365 and the applicable terms of\
      \ use.\n\n\nStudents and teachers can give their consent independently with\
      \ this app - there\nis no need for time-consuming management, e.g. through paperwork\
      \ and manual adding\nthe consent in a school administration program, e.g. by\
      \ the secretariat or teachers.\n\n\nAdministrators can conveniently retrieve\
      \ user consents and save them in various formats.  \n\nApp documentation: [https://qua-dev.com/qd-consent](https://qua-dev.com/qd-consent)\
      \  \n\n\nLicensing is required to fully operate this app.\n\nIf no license is\
      \ available, a trial license is automatically used.  \n\nAfter installing this\
      \ app, the admin can log in as described at  [https://qua-dev.com/qd-consent#3-2_admin-user](https://qua-dev.com/qd-consent#3-2_admin-user)\
      \ and continue setting up the app.\n\n \n"
    name: QD Consent
    short_description: 'QD Consent is an app for UCS that automates consent to the
      data transfer of personal

      data to Microsoft365 and the applicable terms of use.

      '
