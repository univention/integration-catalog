    long_description: 'OX Guard ist eine Verschlüsselung für OX App Suite, die ohne
      Installation auskommt

      und einfach zu bedienen ist. OX Guard unterstützt den verschlüsselten Austausch

      von E-Mails und Dateien auch mit Anwendern, die keinen OX App Suite-Account
      besitzen.

      Damit reduziert Open-Xchange entscheidend die Hürde für den Einsatz verschlüsselter

      Kommunikation. Mittels OX Guard werden E-Mails und Dateien nicht nur während
      des

      Transportes verschlüsselt, sondern auch verschlüsselt auf dem OX Server gespeichert.

      Bitte beachten: OX Guard benötigt die OX App Suite v7.10.2.

      '
    name: OX Guard
    short_description: 'OX Guard

