    long_description: "[Microsoft 365 is built for your business](https://products.office.com/en/business/).\
      \  \n\n\nThe Microsoft 365 Nubus connector allows to easily provision Microsoft\
      \ 365 user accounts\nwith single sign-on from the Univention Nubus IAM for UCS.\
      \ Utilizing the Univention\nNubus identity management features, selected Nubus\
      \ accounts are automatically added,\nupdated or deleted in your Microsoft 365\
      \ business account.\n\nUsers log in with their Nubus username and password and\
      \ can immediately use the Microsoft\n365 collaboration features. Using Keycloak\
      \ based single sign-on of Nubus to log into\nMicrosoft 365, the user password\
      \ never leaves the Nubus for UCS domain.\n\nThis app is intended for organisations\
      \ that want to manage their users with Nubus\nfor UCS and give them access to\
      \ Microsoft 365 features or to associated licences\nfor Microsoft desktop software.\
      \ To setup the integration, an Azure Active Directory\nand Microsoft 365 (test-)subscription\
      \ is required.\n"
    name: Microsoft 365 Connector
    short_description: 'Single Sign-On to Microsoft 365 for Nubus users

      '
