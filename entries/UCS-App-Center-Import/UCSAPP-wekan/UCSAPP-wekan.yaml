    long_description: "To-do-Listen pflegen, Teamwork in der Schule oder mit Kollegen\
      \ in der Firma organisieren,\neine Feier oder den nächsten Urlaub planen – Kanban-Boards\
      \ sind praktische Helfer,\num Aufgaben zu strukturieren, Projekte zu visualisieren\
      \ und diese effizienter durchzuführen.\nDas Open Source Kanban Board Wekan hilft\
      \ Ihnen, sich auf bestimmte Tätigkeiten zu\nkonzentrieren, Projekte und näher\
      \ rückende Deadlines im Auge zu behalten.  \n\n\n## Mit Wekan Tasks und To-does\
      \ managen\n[Wekan](https://wekan.github.io/) bietet ein kartenbasiertes Task-\
      \ und To-do-Management, Boards, Listen, Swimlanes, Label, Vorlagen und Archivierungsmöglichkeiten.\
      \ Den Karten weisen Sie unterschiedliche Farben als visuelle Marker hinzu, verschieben\
      \ sie per Drag & Drop in andere Listen oder Boards und versehen sie mit Dateianhängen.\
      \ Kollaborative Bearbeitungsmöglichkeiten bringen Transparenz ins Teamwork:\
      \ Fügen Sie Benutzer zu Boards und Karten hinzu und weisen Sie ihnen per Mausklick\
      \ Aufgaben zu.  \n\n## Wekan und UCS\nWekan integriert sich nahtlos in die UCS-Umgebung\
      \ und nutzt vorhandene LDAP-Services.\nÜber die Univention Management Console\
      \ (UMC) schalten Sie den Zugriff auf die Wekan-App\nfür einzelne oder alle Benutzer\
      \ einer Domäne frei. Außerdem legen Sie Accounts\nmit Administratorrechten an,\
      \ die in der Wekan-Oberfläche dann die Admin-Rolle haben\nund dort andere Benutzer\
      \ verwalten dürfen.\n"
