      URL: ''
    long_description: 'OX Guard is a fully integrated security add-on to OX App Suite
      that provides end

      users with a flexible email and file encryption solution. OX Guard is a highly
      scalable,

      multi server, feature rich solution that is so simple-to-use that end users
      will

      actually use it. With a single click a user can take control of their security
      and

      send secure emails and share encrypted files. This can be done from any device
      to

      both OX App Suite and non-OX App Suite users. The browser-based reader for non-OX

      App Suite users is also perfect for advertising and viral user acquisition.
      Note:

      OX Guard needs a installed OX App Suite v7.10.2.

      '
    name: OX Guard
    short_description: 'OX Guard

