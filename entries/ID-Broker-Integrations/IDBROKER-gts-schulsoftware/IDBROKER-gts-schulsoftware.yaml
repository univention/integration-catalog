        URL: https://www.gts-schulsoftware.de/
    long_description: |
      GTS Schulsoftware von ivPRO GmbH ist eine spezialisierte
      Verwaltungssoftware für Ganztagsschulen. Die seit über 10 Jahren
      entwickelte Lösung unterstützt Schulen und Träger bei der Verwaltung
      des Ganztagsbetriebs.

      ## Funktionen

      - **GTS** – Verwaltungssoftware für einzelne Ganztagsschulen:
        Buchungssystem, Abwesenheitsverwaltung, Elternportal für
        Krankmeldungen und Sondergehzeiten
      - **GTSPro** – Für Träger mehrerer Ganztagsschulen:
        Verwaltung und Abrechnung gegenüber Eltern, Übersicht
        über alle angebundenen Schulen
      - Hosting in deutschem Rechenzentrum mit SSL-Verschlüsselung
      - Tägliche automatische Backups
      - DSGVO-konforme Datenverarbeitung

      ## Integration mit UCS@school

      GTS Schulsoftware ist über den Univention ID Broker an UCS@school
      angebunden. Lehrkräfte und Verwaltung können sich mit ihrem
      UCS@school-Benutzerkonto per Single Sign-On anmelden.
