  en-US:
    icon: ucs_logo.svg
    keywords:
    - System services,UCS components
    - Education
    - Infrastructure
    - Security
    - Identity Management
    links:
    - Description: ''
      URL: ''
    long_description: 'The RADIUS app increases security for IT infrastructures that
      are managed with UCS.

      It secures the access to the network via the [RADIUS protocol](https://en.wikipedia.org/wiki/RADIUS).
      RADIUS works as "gate keeper" and checks for legitimate access of users before
      they enter the network. The app takes care of authentication and authorization
      for users and groups, e.g. for wifi networks.


      The configuration is integrated in the Nubus management system for UCS and it
      is

      done via allow and deny lists directly at the user, group and device objects.
      Authorized

      users identifiy themselves with their usual domain credentials. This allows
      among

      others "bring your own device" concepts.

      '
    name: RADIUS
    short_description: 'Network access control for identities and endpoint devices

      '
