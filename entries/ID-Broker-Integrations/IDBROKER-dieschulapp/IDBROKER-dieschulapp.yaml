      - Description: DieSchulApp Website
        URL: https://www.dieschulapp.de/
    long_description: |
      DieSchulApp is a comprehensive communication and administration app for
      schools by Virality GmbH, Munich. The app digitalises recurring
      administrative tasks and enables fast, direct communication between
      schools and parents.

      ## Features

      ### Communication
      - Messages and parent letters with read receipt and push notification
      - School chat (GDPR-compliant)
      - School calendar and appointments
      - Timetable and substitution plan display
      - Homework overview in the app

      ### Administration
      - Digital class register
      - Sick notes via app (digital parent reporting)
      - Absence management and substitution planning
      - Resource management and applications
      - Parent-teacher meetings and office hours booking
      - Achievement records and digital lists

      ### Teaching
      - Video lessons for sick or quarantined students
      - Learning blog for tasks and corrections
      - ChatGPT integration for schools (EduBot)

      GDPR-compliant, SSL-encrypted, hosted in Germany.

      ## Integration with UCS@school

      DieSchulApp is connected to UCS@school via the Univention ID Broker.
      Students and teachers can log in to DieSchulApp with their UCS@school
      credentials using Single Sign-On.
