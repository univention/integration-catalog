    long_description: |
      KNOWBODY ist eine digitale Bildungsplattform für Schulen. Die Lösung
      unterstützt Schulen bei der Verwaltung und Bereitstellung von Wissen
      und digitalen Bildungsangeboten.

      ## Integration mit UCS@school

      KNOWBODY ist über den Univention ID Broker an UCS@school angebunden.
      Schüler*innen und Lehrkräfte können sich mit ihrem UCS@school-Benutzerkonto
      per Single Sign-On bei KNOWBODY anmelden.
