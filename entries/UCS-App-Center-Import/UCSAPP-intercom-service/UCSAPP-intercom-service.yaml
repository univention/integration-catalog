    links:
    - Description: ''
      URL: ''
    long_description: 'Der UCS Intercom Service (ICS) ist ein Backend-Dienst, der
      als Vermittler für die

      sichere Kommunikation und Single Sign-On zwischen anderen Diensten fungiert.
      Der

      ICS ermöglicht es Webservice-Backends, auf der Grundlage der Single Sign-On-Sitzung

      des aktuellen Endbenutzers miteinander zu kommunizieren und gleichzeitig die
      Sitzungssicherheit

      zu gewährleisten.



      Der ICS ist sehr spezifisch für bestimmte Anwendungsfälle, derzeit für die Interaktion

      zwischen Open-Xchange, Nextcloud und elements/matrix. Details sind in der Dokumentation

      beschrieben.



      Die App kann nur erfolgreich installiert werden, wenn einige Voraussetzungen
      erfüllt

      sind. **Bitte konsultieren Sie vor der Installation die [Dokumentation!](https://docs.software-univention.de/intercom-service/latest/)**



      '
    name: UCS Intercom Service
    short_description: 'Service für sichere Backend-Kommunikation in Single Sign-On
      Szenarien.

      '
