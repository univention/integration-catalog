  en-US:
    icon: logo.svg
    keywords:
    - System services
    - Education
    - UCS components
    - Identity Management
    links:
    - Description: ''
      URL: ''
    long_description: "This app provides the backend of the Nubus self service for\
      \ your UCS environment.  \n\nThe Nubus Self Service allows users to manage their\
      \ user data independently without\nadministrator support. Currently the following\
      \ modules exist that can be accessed\nby every user via a menu in the Univention\
      \ Portal or using a direct link:  \n\n\n- Change password: Users can change\
      \ their password as long as they remember their current one.\n- Reset password:\
      \ Users can reset their password. They receive a key (or token) to an email\
      \ address or mobile phone number that they have setup previously. Users can\
      \ set a new password utilizing the token they received.\n- Edit own contact\
      \ information: Users can maintain their own contact attributes after logon.\
      \ Administrators can specify the attributes displayed here, including their\
      \ order.  \n\nIn addition an \"invite\" functionality is added while creating\
      \ new user\naccounts: When creating a new user, an e-mail address for inviting\
      \ the user can be\nspecified instead of an initial password. In this procedure,\
      \ a self-service token\nis sent to new users so they can set their own password.\
      \  \n   \nThe user self service reduces efforts in the IT helpdesk department,\
      \ because it reduces\ninquiries dealing with password management.\n"
    name: Self Service Backend
    short_description: 'Self Service backend components.

      '
