    long_description: 'Univention Active Directory Takeover ermöglicht die Migrationvon
      Objekten von einem

      nativen Active Directory Domänencontroller zu einemUnivention Nubus Samba/AD
      Domänencontroller.

      Dies vereinfacht die Migrationeiner existierenden Active Directory Domäne zu
      einer

      auf UCS betriebenen NubusSamba/AD Domäne, unter Beibehaltung aller GPO-Richtlinen,

      SIDs undGruppenmitgliedschaften. Das Ziel dieses Moduls ist letztendlich alle
      ActiveDirectory

      Domänencontroller abzuschalten. Wenn andererseits gewünscht ist, Nubusauf UCS
      als

      Mitglied einer Active Directory-Domäne oder parallel zu dieser zubetreiben,
      sollte

      stattdessen die Applikation Active Directory-Verbindungverwendet werden.

      '
    name: Active Directory Takeover
    short_description: 'Übertragung bestehender Active Directory-Domänen nach Nubus
      auf UCS

      '
