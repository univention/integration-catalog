        URL: https://de.bettermarks.com/
    long_description: |
      bettermarks ist ein adaptives Lernsystem für Mathematik, das Schüler*innen
      der Klassen 4 bis 10 individuell fördert. Die KI-gestützte Plattform passt
      sich dem Lernstand jedes Kindes an und bietet gezielte Übungen mit sofortigem
      Feedback.

      ## Funktionen

      - Adaptives, KI-gestütztes Lern- und Lehrsystem für Mathematik
      - Wissenschaftlich nachgewiesene Lernwirksamkeit
      - Klassen 4–10, alle Bundesländer und Lehrpläne abgedeckt
      - Sofortiges Feedback und individuelle Lernpfade
      - Lehrkräfte-Dashboard zur Lernstandsbeobachtung
      - Whitelabel-Plattform für Verlage

      ## Integration mit UCS@school

      bettermarks ist über den Univention ID Broker an UCS@school angebunden.
      Schüler*innen und Lehrkräfte können sich mit ihrem gewohnten UCS@school-
      Benutzerkonto per Single Sign-On bei bettermarks anmelden.
