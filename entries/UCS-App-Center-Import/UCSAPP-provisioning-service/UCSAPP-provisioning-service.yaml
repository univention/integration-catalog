    long_description: "The Provisioning Service is an event and messaging service\
      \ that can notify interested\nservices aboutevents in the LDAP directory service.\
      \ When data changes in the LDAP\ndirectory on the PrimaryDirectory Node, the\
      \ Provisioning Service receives a notification\nabout the change and notifies\
      \ anysubscribed services about the change. In contrast\nto the Univention Directory\
      \ Listener, it providesthe UDM representation of the change\nobjects instead\
      \ of the LDAP representation.  \n\nFor more details refer to the official [UCS\
      \ Provisioning Service documentation](https://docs.software-univention.de/manual/5.2/en/domain-ldap/nubus-provisioning-service.html)\
      \ and the [Nubus Customization and Modification Manual](https://docs.software-univention.de/nubus-kubernetes-customization/1.x/en/index.html).\n"
