    long_description: 'Wenn Ihre Organisation von den Vorteilen des einfachen Teilens
      von Daten und der

      Online-Kollaboration profitieren möchte, wie es von vielen Cloud-Produkten angeboten

      wird, Sie jedoch die Anforderung haben, die Kontrolle zu behalten und nicht
      autorisiertem

      Zugriff vorzubeugen, dann bietet Nextcloud die Lösung, nach der Sie suchen.


      Nextcloud bietet die in der Branche einzigartige vollständige Open Source Lösung

      für On-Premise Datenverarbeitung und Kommunikation mit einem kompromisslosen
      Fokus

      auf Sicherheit und Datenschutz.


      ## Funktionsumfang


      Nextcloud vereinigt universellen Datenzugriff mit sicheren Kommunikations- und
      Kollaborationsmöglichkeiten

      der nächsten Generation unter direkter Kontrolle Ihrer IT, integriert in die
      bestehende

      Infrastruktur. Nextclouds offene, modulare Architektur, die Ausrichtung auf
      Sicherheit

      und die fortgeschrittenen Fähigkeiten zur Föderation ermöglichen es modernen
      Unternehmen,

      ihr bestehendes IT Kapital innerhalb und über die Grenzen ihrer Organisation
      hinaus

      auszureizen.


      ### Features:



      - Einfach zu bedienende Weboberfläche und Anwendungen für Android, iOS, Windows,
      Mac und Linux

      - Einfache Zusammenarbeit und Dateiaustausch intern wie extern mit optionalen
      Vorgaben wie Passwortschutz und Auslaufdatum

      - Eingebauter Audio- und Video-Chat, optional kollaboratives Bearbeiten von
      Office-Dokumenten, Outlook Integration und mehr

      - Unterstützung externer Datenspeicher wie Windows Network Drive, FTP, WebDAV,
      NFS und weitere

      - Zahlreiche passive und aktive Sicherheitsfunktionen wie 2-Faktor-Authentifizierung,
      Brute-Force-Schutz und CSP 3.0 als auch einen Auditlog

      - Optional mit serverseitiger Verschlüsselung (pro externem Speicher einstellbar)
      und [Ende-zu-Ende-clientseitiger Verschlüsselung](https://nextcloud.com/endtoend)
      (pro Ordner einstellbar)

      - Volle administrative Kontrolle über Dateiaustausch mittels File Access Control
      Regeln wie beispielsweise "DOCX darf nur aus dem internen Netzwerk heruntergeladen
      werden" oder ausgeführte Aktionen bei bestimmten Aktionen (z.B. das Setzen von
      Schlagwörtern)

      Hier erfahren Sie mehr über den [Funktionsumfang von Nextcloud](https://nextcloud.com/features).
      Erfahren Sie mehr über [unser Angebot für Universitäten und Schulen.](https://nextcloud.com/education)
      Lernen Sie auch, wie die TU Berlin Nextcloud nutzt mit 22.000 Studenten.



      ### Vergleich


      Verglichen mit anderen privaten Cloud-Lösungen bietet Nextcloud stärkere eingebaute

      Sicherheitsmaßnahmen, wie etwa 2-Faktor-Authentifizierung, Brute-Force-Schutz
      und

      [viele weitere Schutzvorkehrungen](https://nextcloud.com/secure). Nextcloud
      ist vollständig Open Source und das am [aktivsten entwickelte Dateisynchronisations-
      und Dateiaustausch-Projekt](https://nextcloud.com/blog/nextcloud-the-most-active-open-source-file-sync-and-share-project/).


      Erfahren Sie [hier mehr über die Migration von anderen Lösungen auf Nextcloud](https://nextcloud.com/migration).


      Nextcloud zielt auf Organisationen von 50 bis Millionen von Nutzern ab, einschließlich

      Branchen wie Bildung, Verwaltung und Behörden, juristische wie finanzielle Dienstleister

      und Fertigung.

      Weitere Informationen finden Sie auf [nextcloud.com](https://nextcloud.com)
      oder folgen Sie [@Nextclouders auf Twitter](https://twitter.com/nextclouders).

      ## Integration


      Nextcloud ist gut in UCS integriert und bietet eine einfache Installation. Die
      automatische

      Konfiguration beinhaltet folgende Punkte:


      - Der Administrator Account ist ebenfalls Nextcloud Administrator

      - Standardmäßig können alle Nutzer Nextcloud verwenden

      - Benutzer und Gruppen können in den jeweiligen Einstellungen freigeschaltet
      bzw. ausgeschlossen werden

      - Die Speichergröße kann pro Benutzer in den Nutzereinstellungen gesetzt werden

      - Alle Benutzer und Gruppen profitieren vom Nextcloud LDAP Schema

      - Der Web Server ist komplett eingerichtet und steht hinter dem als Reverse
      Proxy fungierenden und TLS abwickelnden UCS Web Server


      Die Nextcloud-App für UCS im Univention App Center basiert auf der neuesten
      Version

      aus dem Kanal für stabile Updates von Nextcloud. Major Versionen werden in der
      Regel

      innerhalb von 3-6 Monaten nach Veröffentlichung über den stabilen Update-Kanal

      bereitgestellt. Die App erhält dann auch ein Update im App Center.

      '
