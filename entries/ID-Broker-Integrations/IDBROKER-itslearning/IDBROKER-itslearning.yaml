        URL: https://itslearning.com/
    long_description: |
      itslearning ist Europas führendes Lernmanagementsystem (LMS) für Schulen.
      Die Plattform unterstützt Lehrkräfte dabei, Unterricht zu planen, Materialien
      bereitzustellen, Aufgaben zu stellen und den Lernfortschritt zu verfolgen.

      ## Funktionen

      - Unterrichtsplanung und -durchführung mit digitalen Inhalten
      - Aufgabenstellung, Einreichung und Bewertung
      - Kommunikation zwischen Lehrkräften, Schüler*innen und Eltern
      - Kollaboratives Arbeiten und Teilen von Materialien
      - Lernfortschrittsverfolgung und Berichterstattung
      - Integration externer Lernwerkzeuge und Medien (LTI)

      ## Integration mit UCS@school

      itslearning ist über den Univention ID Broker an UCS@school angebunden.
      Schüler*innen und Lehrkräfte können sich mit ihrem UCS@school-Benutzerkonto
      per Single Sign-On bei itslearning anmelden.
    name: itslearning LMS
    short_description: Europas führendes Lernmanagementsystem für Schulen
