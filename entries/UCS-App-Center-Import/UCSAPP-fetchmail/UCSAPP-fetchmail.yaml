    long_description: 'This app extends UCS with Fetchmail, a mail retrieval and forwarding
      program. Mails

      are fetched from remote mail servers and forwarded to the local delivery system.

      Fetchmail can be run as a service to constantly pull emails from multiple servers

      at a specifed interval. The configuration is done per user in the Nubus Identity

      Management of UCS.

      '
    name: Fetchmail
    short_description: 'Retrieve and deliver mail stored at a mail service provider

