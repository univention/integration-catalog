    links:
      - Description: DieSchulApp Website
        URL: https://www.dieschulapp.de/
    long_description: |
      DieSchulApp ist eine umfassende Kommunikations- und Verwaltungs-App für
      Schulen von Virality GmbH aus München. Die App digitalisiert
      wiederkehrende Verwaltungsaufgaben und ermöglicht schnelle, direkte
      Kommunikation zwischen Schulen und Eltern.

      ## Funktionen

      ### Kommunikation
      - Mitteilungen und Elternbriefe mit Lesebestätigung und Push-Nachricht
      - Chat für Schulen (DSGVO-konform)
      - Schulkalender und Termine
      - Stundenplan und Vertretungsplan-Bildschirm
      - Hausaufgabenübersicht in der App

      ### Verwaltung
      - Digitales Klassenbuch
      - Krankmeldungen per App (digitale Elternmeldung)
      - Absenzenverwaltung und Vertretungsplanung
      - Ressourcenverwaltung und Anträge
      - Elternsprechtag und Sprechstunden online organisieren
      - Leistungsnachweise und digitale Listen

      ### Unterricht
      - Video-Unterricht für Kranke und Quarantäne-Schüler*innen
      - Lernblog für Aufgaben und Korrekturen
      - ChatGPT-Integration für Schulen (EduBot)

      DSGVO-konform, SSL-verschlüsselt, Hosting in Deutschland.

      ## Integration mit UCS@school

      DieSchulApp ist über den Univention ID Broker an UCS@school angebunden.
      Schüler*innen und Lehrkräfte können sich mit ihrem UCS@school-Benutzerkonto
      per Single Sign-On bei DieSchulApp anmelden.
