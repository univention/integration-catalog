    long_description: "Sie suchen eine flexible und freie Kollaborations-Lösung als\
      \ Alternative zu Microsoft\n365 oder Google Workspace? EGroupware ist das Smart\
      \ Online Office für den Webbrowser\nvon der EGroupware GmbH aus Kaiserslautern:\
      \ Open Source, DSGVO-konform, anpassungsfähig\nund erweiterbar – auf Wunsch\
      \ mit professionellem Support\n\n## Funktionen und Features\n\nEGroupware ist\
      \ eine komplette Groupware-Lösung, modular aufgebaut und erweiterbar.\nZusätzlich\
      \ zu den Eigenentwicklungen bindet das Smart Online Office auch Partner-Produkte\n\
      und bewährte Open-Source-Applikationen anderer Hersteller ein.\n\nEGroupware\
      \ enthält alles, was KMUs (kleine und mittelständische Unternehmen), Stadtverwaltungen\n\
      oder auch Bildungs- und Forschungseinrichtungen für die tägliche Arbeit brauchen:\n\
      \n- [Dateimanager](https://www.egroupware.org/dateiverwaltung), [Mail](https://www.egroupware.org/email),\
      \ [Kalender](https://www.egroupware.org/kalender), [Adressverwaltung](https://www.egroupware.org/kontakte)\n\
      - [Projektmanangement-Tool](https://www.egroupware.org/projekte), [Zeiterfassung](https://www.egroupware.org/stundenzettel),\
      \ [Aufgabenplaner](https://www.egroupware.org/aufgaben), [Kanban-Board](https://www.egroupware.org/kanban)\n\
      - [integrierte Officesuite](https://www.egroupware.org/online-office) (Collabora\
      \ Online), Daten aus EGroupware/Platzhalter in Dokumenten nutzen\n- [File Sharing](https://www.egroupware.org/dateiverwaltung)\
      \ (mit offenen und verdeckten Freigaben für Nutzer/Gruppen)  \n\n- [Kontakt\
      \ Sharing](https://www.egroupware.org/kontakte) (intern/extern, mit/ohne Schreibrechte\
      \ und Dateimanagerzugriff)    \n\n- [Kundenmanagement](https://www.egroupware.org/crm)\
      \ (CRM) und [Ticketsystem](https://www.egroupware.org/helpdesk)\n- [Rechnungen](https://www.egroupware.org/de/e-rechnung)\
      \ als  XRechnung (XML-Format) als auch ZUGFeRD (hybrides PDF/XML) erstellen,\
      \ importieren, visualisieren und drucken\n- [Videochat/-konferenz](https://www.egroupware.org/videokonferenzen),\
      \ [Chat](https://www.egroupware.org/chat) und Desktopfreigabe (Jitsi, BigBlueButton,\
      \ Rocket.Chat)\n- Anwendung zum videogestützten Lernen: [VIDOTEACH](https://www.vidoteach.de)\
      \ interagiert dank LTI (Learning Tools Interoperability) sehr gut mit anderen\
      \ Lern-Management-Systemen\n- Responsives Design mit voller Unterstützung für\
      \ mobile Geräte ab 5\"\n- [Telefonie-Integration](https://www.egroupware.org/cti-telefon-integration)\
      \ (CTI), Koppeln von Telefonen (Softphones, Tischtelefone) und Computern/Smartphones\n\
      - Import/Export und [Synchronisation](https://www.egroupware.org/synchronisation)\
      \ von Daten (ActiveSync, Card/Cal/WebDAV)\n- Einbinden externer Ressourcen in\
      \ den Dateimanager (SMB, WebDAV, NFS usw.)\n- Application-Firewall mit Zugriffsbegrenzungen,\
      \ Brute-Force-Schutz, 2FA und Login-Regeln  \n- Offene Schnittstellen und [REST\
      \ API](https://github.com/EGroupware/egroupware/tree/master/doc/REST-CalDAV-CardDAV#rest-api-using-egroupware-caldavcarddav-server-with-json),\
      \ die das Implementieren eigener Applikationen oder externer Systeme wie etwa\
      \ ERP ermöglichen und erleichtern\n- Integration weiterer Produkte und Webanwendungen\
      \ problemlos möglich; Anbindung per OpenID/OAuth2-Server an die bestehende Benutzerverwaltung\n\
      - Auftragsentwicklung und Anpassung an die eigene Infrastruktur durch den Hersteller\
      \ möglich\n\nMit benutzerdefinierten Feldern, Maskenänderungen, eigenen Informationstypen\
      \ Adressbuch/InfoLog\nund vielfältigen Berechtigungs-Möglichkeiten bis hin zur\
      \ Entwicklung/Betrieb eigener\nAnwendungen kann EGroupware weitreichend den\
      \ eigenen Anforderungen angepasst werden.  \n\n\nDie kostenfreie Community Edition\
      \ (CE) enthält alle Grundfunktionen; die Enterprise\nLine (EPL) kommt mit zusätzlichen\
      \ Features und Anwendungen, erweitertem Support\nund Funktionen, die insbesondere\
      \ für Unternehmen, kleine und große Organisationen\ninteressant sind – egal,\
      \ ob 10 oder mehrere Tausend Benutzer\\*innen damit arbeiten.\nRabatte für NGOs/Bildungsträger\
      \ sind auf [Anfrage](https://www.egroupware.org/de/kontakt) erhältlich.\n\n\
      ## Installation und Betrieb\n\nDie EGroupware-App ist sehr gut in Univention\
      \ Corporate Server integriert, einfach\nzu installieren und an die Benutzer-/Gruppenverwaltung\
      \ sowie den Mailserver angebunden.\nDie automatische Konfiguration der App richtet\
      \ Folgendes ein:\n\n- Der UCS-Administrator ist EGroupware-Administrator.\n\
      - Alle UCS-Benutzer\\*innen können EGroupware verwenden, wenn Administratoren\
      \ die entsprechenden Zugriffsrechte setzen.\n- EGroupware nutzt UCS als Reverse\
      \ Proxy und ist per SSL abgesichert.\n\nEinmal pro Jahr erscheint ein Major\
      \ Release vom Hersteller; zusätzlich werden etwa\n8 bis 10 Updates jährlich\
      \ mit Fixes und neuen Funktionen veröffentlicht. Die\nUCS-Version der Groupware-Lösung\
      \ durchläuft zusätzliche Tests und erscheint in\nder Regel wenige Tage nach\
      \ der vom Hersteller veröffentlichten Version.\n\nDie App installiert die EPL-Version\
      \ von EGroupware mit einer 30-Tage-Testlizenz.\nNach Ablauf der 30 Tage können\
      \ Kunden eine EPL-Lizenz vom Hersteller erwerben oder\nihre Installation als\
      \ Community Edition weiter betreiben .  \nSeit der EGroupware-Version 21.1.20210923\
      \ ist es möglich, auf einem Univention Corporate\nServer (UCS) die Community-Version\
      \ von EGroupware zu betreiben. Die Umstellung auf\ndie Community-Version ist\
      \ im [Forum](https://help.egroupware.org/t/de-uk-egroupware-community-edition-auf-on-ucs/76311)\
      \ dokumentiert.  \n \n\nAlternativ bietet der Hersteller EGroupware als Installationspaket\
      \ für verschiedene\nLinux-Distributionen oder als gehostete SaaS-Lösung in deutschen\
      \ Rechenzentren an,\ndie Sie ebenfalls an eine bestehende UCS-Domäne anbinden\
      \ können. Es ist darüber\nhinaus möglich, die gehostete SaaS-Lösung zu einem\
      \ On-Premises-UCS zu migrieren.\n\n## Weiterführende Informationen\n\nEine vollständige\
      \ Liste aller Features und Funktionen präsentiert die [EGroupware-Website](https://www.egroupware.org/).\
      \ Neben dem professionellen Support durch den Hersteller gibt es Unterstützung\
      \ aus der Community: Diskutieren Sie mit anderen Anwendern und EGroupware-Entwicklern\
      \ im mehrsprachigen [Forum](https://help.egroupware.org/). Ankündigungen und\
      \ Neuigkeiten veröffentlicht der Hersteller im [Forum](https://help.egroupware.org/c/announcements)\
      \ und auf [GitHub](https://github.com/EGroupware)/[Mastodon](https://fosstodon.org/@EGroupware)/[Bluesky](https://bsky.app/profile/egroupware.org)/[Linkedin](https://www.linkedin.com/company/egroupware-gmbh)/[Facebook](https://www.facebook.com/EGroupware).\
      \ Zahlreiche Vorträge und Aufzeichnungen von Webinaren finden Sie auf dem [YouTube-Kanal](https://www.youtube.com/c/EGroupware).\
      \  \n \n"
