  de-DE:
    icon: m23-logo.svg
    keywords:
    - System services
    - Device Management
    links:
    - Description: ''
      URL: ''
    long_description: 'm23 erleichtert Ihnen das Ausrollen und die Administration
      Ihrer Linux-Clients. Dabei

      spielt es keine Rolle, ob Sie nur wenige Clients administrieren möchten oder
      einen

      ganzen Rechnerpark mit Desktops oder Servern betreiben.


      Mit m23 **installieren** und **administrieren** Sie Linux-Clients mit Debian,
      Ubuntu

      und Linux Mint. Wählen Sie hierbei aus mehreren automatisch eingerichteten **Desktopumgebungen**

      und tausenden von Softwarepaketen.


      Beim **Bare-Metal-Deployment** erkennt m23 die Hardware Ihrer Clients, partitioniert

      und formatiert Festplatten und installiert das gewünschte Linux-Betriebssystem
      über

      das Netzwerk. Bereits **existierende** Debian-, Ubuntu- und LinuxMint-**Clients**

      können in m23 **integriert** und wie mit m23 aufgesetzte Clients administriert
      werden.

      **m23-Clients** können über die m23-Oberfläche **aktualisiert** und **wiederhergestellt**,

      die **Software installiert** und **entfernt** werden. Mit dem **Masseninstallationswerkzeug**

      können auf einfache Weise **viele Clients** aufgesetzt werden. Mittels der **Gruppenverwaltung**

      führen Sie **Aufträge** auf einer **Reihe von Clients** aus. Das integrierte
      **m23-Serverbackup**

      schützt vor Datenverlusten. **Skripte** und **Softwarepakete** zur Installation

      auf den Clients können direkt aus der Oberfläche erstellt werden.


      ### Kommerzieller Support


      Kommerziellen Support erhalten Sie von [goos-habermann.de](https://goos-habermann.de).

      '
    name: m23 Softwareverteilung
    short_description: 'OpenSource Softwareverteilung und Management für Linux-Clients

      '
    tags: []
    visuals:
