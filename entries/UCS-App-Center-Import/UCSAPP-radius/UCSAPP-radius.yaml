    long_description: 'Die RADIUS App erhöht die Sicherheit für IT-Infrastrukturen,
      die mit UCS verwaltet

      werden, indem der Zugang zum Netzwerk über das [RADIUS-Protokoll](https://de.wikipedia.org/wiki/Remote_Authentication_Dial-In_User_Service)
      abgesichert wird. RADIUS fungiert als einer Art "Türsteher" und prüft auf rechtmäßigen
      Zugang von Nutzern, bevor sie in das Netzwerk gelangen. Die App übernimmt hierbei
      die Authentisierung und Autorisierung für Benutzer und Gruppen z.B. gegenüber
      eines WLANs.


      Die Konfiguration ist in das Nubus Managementsystem von UCS integriert und erfolgt

      über Sperr- und Freigabelisten direkt an Benutzer-, Gruppen- und Endgeräteobjekten.

      Zugelassene Benutzer authentifizieren sich mit ihren üblichen Domänenzugangsdaten,

      so dass u.a. auch "Bring your own Device" Konzepte ermöglicht werden.

      '
    name: RADIUS
    short_description: 'Netzwerkzugangskontrolle für Benutzer, Gruppen und Endgeräte

      '
