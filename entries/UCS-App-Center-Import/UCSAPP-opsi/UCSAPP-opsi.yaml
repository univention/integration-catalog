    long_description: "opsi (Open System Integration) ist das **zentrale Werkzeug**\
      \ zum Verwalten von Windows-,\nLinux- und macOS-Clients. Die Kernkomponente\
      \ ist ein Linux-Server, der sich um die\nfolgenden Aufgaben kümmert:  \n\n-\
      \ automatische Installation des Betriebssystems (nur Windows und Linux)\n- Verteilung\
      \ von Software, darunter auch Updates und Patches\n- Inventarisierung von Hard-\
      \ und Software  \n\nopsi verwaltet Clients an mehreren Standorten in einem einzigen\
      \ Administrations-Interface.\nDie Konfiguration wird an zentraler Stelle gespeichert,\
      \ die Depots für die Softwarepakete\nder Clients können an unterschiedlichen\
      \ Orten liegen.  \n   \n**Erweiterungen  \n **  \nopsi ist Open-Source-Software;\
      \ alle Hauptbestandteile stehen unter der AGPLv3-Lizenz.\nDie Kernfunktionalität\
      \ sowie die hier im Univention App Center bereitgestellte Version\nist lizenzkostenfrei\
      \ einsetzbar. Darüber hinaus bietet der Hersteller, die Firma\nuib gmbh, kostenpflichtige\
      \ [Erweiterungen](https://opsi.org/de/extensions/) als Subscription an. Bis\
      \ 30 Clients können die meisten Erweiterungen kostenlos verwendet werden. [Hier](https://www.uib.de/opsi-basic)\
      \ finden Sie die opsi Basic-Lizenz.  \n\nEs gibt unter anderem die folgenden\
      \ Erweiterungen, die den Funktionsumfang erweitern:  \n   \n\n- Directory Connector:\
      \ synchronisiert Daten zwischen den Clients und einem LDAP-fähigen Verzeichnisdienst\
      \ (z. B. Active Directory oder Samba 4)\n- Lizenzmanagement: verwaltet Lizenzen\
      \ an zentraler Stelle, das heißt, im opsi-Konfigurationseditor\n- UEFI/Secureboot:\
      \ Support für UEFI/GPT-Partitionen und Secureboot\n- Scalability: Performance-Steigerung\
      \ für sehr große Umgebungen; startet den opsi-Service mit mehreren Worker-Prozessen\
      \ und/oder betreibt den Dienst parallel auf mehreren Servern\n- WIM-Capture:\
      \ liest die Windows-Installation aus (inkl. Konfiguration, installierter Software\
      \ und Hotfixes), speichert alles als WIM (Windows Imaging Format) und installiert\
      \ dieses auf anderen Clients  \n\nIm Rahmen von kostengünstigen [Update-Abonnements](https://www.uib.de/de/support-schulung/update-abonnements/)\
      \ stellt die Firma uib gmbh außerdem konfektionierte Installationspakete und\
      \ MS-Hotfixes bereit oder paketiert auf Wunsch Ihre Spezialsoftware. Der Hersteller\
      \ bietet weiterhin kostenpflichtige [Support-Leistungen](https://www.uib.de/de/support-schulung/support/)\
      \ rund um opsi an, z. B. Wartungsverträge, Workshops und Schulungen.  \n** \
      \ \nInstallationshinweis Client-Synchronisation**  \n   \nFür UCS- und UCS@school-Anwender\\\
      *innen ist die opsi-Erweiterung [Director Connector](https://opsi.org/de/extensions/)\
      \ besonders interessant, die Daten zwischen den opsi-Clients und dem UCS-Verzeichnisdienst\
      \ synchronisiert. So vermeiden Sie die Pflege eines doppelten Datenbestands\
      \ und übernehmen die Daten aus UCS-Verzeichnisdienst in die opsi-Umgebung. Dabei\
      \ spielt es keine Rolle, ob es sich um eine Active-Directory- oder um eine Samba-4-Domäne\
      \ handelt. Der Director Connector ermöglicht ebenfalls, dass sich opsi-Benutzer\
      \ über die Domäne authentifizieren.  \nFür weitere Informationen kontaktieren\
      \ Sie bitte den Hersteller: [info@uib.de](mailto:info@uib.de)\n"
