    long_description: |
      ReLoAd (Resources for Learners and Teachers on Demand – digital) is a
      digital education offering providing learning resources for students and
      teachers. The project offers digitally prepared content available on
      demand for classroom use.

      ## Integration with UCS@school

      ReLoAd is connected to UCS@school via the Univention ID Broker.
      Students and teachers can log in to ReLoAd with their UCS@school
      credentials using Single Sign-On.
