      - Description: Edumaps Website
        URL: https://edumaps.de/
    long_description: |
      Edumaps is a visual workspace for teaching and school organisation. The
      platform enables the creation of structured digital pinboards from ideas,
      materials and tasks. More than 8,600 schools actively use Edumaps, with
      state-wide licences in Hesse, Lower Saxony and Saxony-Anhalt.

      ## Features

      - Digital pinboards, galleries, timelines, sticker walls and weekly plans
      - Real-time collaborative working in the teaching team
      - AI support: create and modify pinboards with AI, automatically generate
        quiz maps, text-to-speech
      - Assignment module: assign tasks and collect feedback
      - Booking and lending system for rooms and equipment
      - Export as Moodle course, PDF, image or offline HTML
      - Supports over 100 file formats
      - GDPR-compliant, audited by datenschutz nord GmbH and VIDIS project
      - Content Security Policy and accessibility (ADA)
      - Surveys, polls, calendar, QR codes and public profiles

      ## Integration with UCS@school

      Edumaps is connected to UCS@school via the Univention ID Broker.
      Students and teachers can log in to Edumaps with their UCS@school
      credentials using Single Sign-On.
