    long_description: "opsi (Open System Integration) is the **central tool** for\
      \ managing Windows, Linux,\nand macOS client computers. The core component is\
      \ a Linux server, taking care of\nthe following tasks:  \n   \n\n- Automatic\
      \ OS installation (Windows and Linux only)\n- Distribution of software, for\
      \ example updates and patches\n- Inventory of hardware and software  \n\nopsi\
      \ manages clients at multiple locations in one single administration interface.\n\
      The configuration is stored in a central location, the repositories for the\
      \ clients'\nsoftware packages can be located in different places.  \n**  \n\
      Extensions  \n **  \nopsi is open source software; all main components are licensed\
      \ under the AGPLv3 licence.\nThe core functionality as well as the version provided\
      \ here in the Univention App\nCentre can be used free of charge. In addition,\
      \ the manufacturer, uib gmbh, offers\npaid [extentions](https://opsi.org/de/extensions/)\
      \  as a subscription. Most of the extensions can be used free of charge for\
      \ up to 30 clients. [Here](https://www.uib.de/opsi-basic) you can find the opsi\
      \ Basic Licence.  \n   \n\n- **Directory Connector**: Synchronizes data between\
      \ clients and an LDAP-enabled directory service (e.g. Active Directory or Samba\
      \ 4)\n- **License Management**: Manages licenses in a central place, in the\
      \ opsi configuration editor\n- **UEFI/Secureboot**: Support fpr UEFI/GPT partitions\
      \ and Secureboot\n- **Scalability**: Performance enhancement for very large\
      \ environments; starts the opsi service with multiple worker processes and/or\
      \ runs the service in parallel on multiple servers\n- **WIM-capture**: captures\
      \ an entire Windows installation (including configuration, installed software,\
      \ and hotfixes), stores everything in the Windows Imaging Format (WIM), and\
      \ allows you to install this on other clients  \n\nAdditionally, the company\
      \ uib gmbh provides affordable [subscriptions](https://www.uib.de/en/support-training/update-subscriptions)\
      \ which include ready-made packages for installadion, MS hotfixes, or special\
      \ software. The manufacturer also offers [support services](https://www.uib.de/en/support-training/support)\
      \ for a fee, e.g. opsi maintenance contracts, workshops, and trainings.  \n\n\
      **About Client Synchronization**  \n   \nFor UCS and UCS@school users the opsi\
      \ extension [Director Connector](https://www.uib.de/en/opsi-cofunding/directory-connector)\
      \ is of particular interest. It synchronizes data between the opsi clients and\
      \ the UCS directory service. You can simply transfer the data from the UCS directory\
      \ service to the opsi environment, avoiding the handling of duplicate data.\
      \ It doesn't matter whether it's an Active Directory or Samba 4 domain. The\
      \ Director Connector also allows opsi users to authenticate via the domain.\
      \  \nFor more information please contact the vendor: [info@uib.de](mailto:info@uib.de)\n"
