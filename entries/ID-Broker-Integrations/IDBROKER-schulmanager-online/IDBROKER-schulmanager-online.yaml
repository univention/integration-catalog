        URL: https://schulmanager-online.de/
    long_description: |
      Schulmanager Online ist eine umfassende Online-Plattform für die gesamte
      Schulorganisation. Über 3.500 Schulen nutzen die Lösung täglich für
      Planung, Organisation und Kommunikation.

      ## Funktionen (31 Module)

      - Digitales Klassenbuch, Fehlzeiten, Noten und Krankmeldung
      - Elternbriefe, Nachrichten und Elternsprechtag-Buchungssystem
      - Stundenplanung, Vertretungsplanung und Infoscreen
      - Videokonferenzen, Wahlfächer, Ganztag und Ressourcenbuchung
      - Schulanmeldung, Zeugnisse und Zeugniskonferenz
      - Kalender, Dokumente und Schwarzes Brett
      - Single Sign-On über OpenID Connect (z. B. mit UCS@school)
      - Läuft in einem ISO 27001-zertifizierten Rechenzentrum in Deutschland
      - Modularer Aufbau – individuell zusammenstellbar

      ## Integration mit UCS@school

      Schulmanager Online ist über den Univention ID Broker an UCS@school
      angebunden. Schüler*innen und Lehrkräfte können sich mit ihrem
      UCS@school-Benutzerkonto per Single Sign-On bei Schulmanager Online
      anmelden.
    name: Schulmanager Online
    short_description: Online-Plattform für Schulorganisation mit 31 Modulen
