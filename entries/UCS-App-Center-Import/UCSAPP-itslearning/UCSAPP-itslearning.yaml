    long_description: '### itslearning ist Europas größter Anbieter für Lernmanagementsysteme
      (LMS) in

      Schulen.


      1999 in Norwegen gegründet ist itslearning ein speziell auf Schule zugeschnittenes

      Lernmanagementsystem (LMS). Bildungsverantwortliche Stellen und Schulträger
      geben

      ihren Schulen  mit itslearning ein Werkzeug an die Hand, das der systematischen
      Arbeit

      mit gültigen Lehrplänen, der Erhöhung von Unterrichtsqualität und dem Lernerfolg

      des Einzelnen dient.


      ### Medienentwicklung und Schulentwicklung


      itslearning ist die Antwort auf die Frage, wie sich alle Benutzer einer Schule
      besser

      organisieren und kommunizieren können. Diese Kommunikation muss mit itslearning

      aber nicht am Schulgebäude enden, denn itslearning erlaubt auch die schulübergreifende

      Kommunikation - der Schulen untereinander aber auch die Zusammenarbeit mit externen

      Partnern wie Eltern, Schulentwicklung, Studienseminaren, Universitäten, Betrieben

      u.v.m.


      ### Bilden und Lernen - überall und von jedem Gerät.


      Die Kernaufgabe des lernzentrierten LMS ist es, den gesamten Kreislauf zu ermöglichen:


      - ** Planen:** Der * Unterrichtsplaner * ist das Werkzeug, mit dem Fachkollegien
      oder Teams * didaktische Planungen * erstellen, die ohne Medienbruch als * Kurs
      * in den Unterricht mitgenommen werden können. Grundlage dafür sind die Verknüpfung
      von Curriculum, Unterrichtsinhalten und Aktivitäten (z.B. Tests, Aufgaben, Quiz
      etc).

      - ** Aktivieren: ** Kollaborieren Sie im Team, gestalten Sie Unterricht mit
      höchstem Grad der Schülerselbstständigkeit und -Beteiligung und binden eigene
      oder externe Medien ein (z.B. YouTube, Sofatutor, etc).

      - ** Unterrichten: ** Behalten Sie immer die Übersicht über Ihre Unterrichtsplanungen
      und nutzen Sie die Qualitätszeit im Klassenraum, um einzelnen Schülern oder
      Gruppen besser weiterzuhelfen. Werkzeuge wie Aufgaben, Diskussionsforen nutzen
      Sie, um für jeden Schüler das beste Lernergebnis zu erreichen.

      - ** Bewerten: ** Werkzeuge wie Tests, Aufgaben etc. können mit unterschiedlichen
      Bewertungssystemen verknüpft werden, von Erreicht/nicht erreicht über Ziffernnoten
      bis hin zu Kompetenzrastern auf Basis Ihres Curriculums.

      - ** Reflektieren: ** Zahlreiche Feedback-Funktionen zwischen Schüler-Lehrer,
      Schüler-Schüler sowie Lehrer-Lehrer helfen im Unterricht oder in der fachübergreifenden
      Zusammenarbeit, die Unterrichts- und Schulqualität zu erhöhen.

      - ** Berichten: ** Ein digitales Klassenbuch hilft Ihnen, transparent, lernförderlich
      und organisiert zu sein - Und hilft Schülern, ihre Leistungen selbst besser
      einschätzen und verbessern zu können.


      Bitte besuchen Sie die itslearning-Webseite, um den vollen Funktionsumfang kennen

      zu lernen.


      ### Der itslearning LMS Connector


      Der itslearning LMS Connector bekommt Daten der Nutzerkonten (Schüler, Lehrer,
      Mitarbeiter)

      und Gruppeninformationen (Klasse und Arbeitsgruppe) aus dem UCS Verzeichnisdienst

      und verarbeitet diese auf dem UCS System. Für die Nutzerprovisionierung wird
      eine

      XML Datei mit Nutzername, Geburtstag, Vorname, Nachname und Gruppenzugehörigkeit

      über einen SFTP Zugang  zu itslearning geschickt. Des Weiteren richtet die App
      ein

      Single Sign-On über das SAML Protokoll  ein, bei dem keine Passwortinformationen

      an itslearning geschickt werden.


      ### Demo anfordern


      Schließen Sie sich den Millionen Nutzern in aller Welt an, die unser schülerzentriertes

      Lernmanagementsystem benutzen. Klicken Sie auf den folgenden Link für eine individuelle

      Demo: [https://de.itslearning.com/request-a-demo#](https://de.itslearning.com/request-a-demo#)


      [Allgemeine Geschäftsbedingungen](https://de.itslearning.com/privacy-commitment/terms)
      | [Datenschutzerklärung](https://de.itslearning.com/privacy-commitment/data-privacy-policy)

      '
