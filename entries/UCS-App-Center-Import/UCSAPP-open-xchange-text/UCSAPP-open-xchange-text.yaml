    long_description: 'OX Documents ist eine Sammlung von dokumentenorientierten Apps
      wie OX Text, OX Spreadsheet

      und OX Presentation.


      ### OX Text - als ein browserbasiertes Textverarbeitungsprogramm


      OX Text ermöglicht das Bearbeiten aller gängigen Textdokumentformate ohne Formatverluste.

      Es ermöglicht Benutzern den Fokus auf die Erstellung des Inhalts, ohne sich
      über

      die Verarbeitung oder das Dateiformat Gedanken machen zu müssen.


      ### OX Spreadsheet - ein cloudbasiertes Tabellenkalkulationsprogramm


      Mit OX Spreadsheet können Sie Tabellen direkt im Browser und auf jedem Endgerät

      bearbeiten. Es muss kein natives Tabellenkalkulationsprogramm installiert werden.

      Auf Tabellen (Microsoft und OpenOffice) kann somit jederzeit, von jedem Ort
      und jedem

      Endgerät zugegriffen werden.


      ### OX Presentation - ein browserbasierte Präsentationseditor


      OX Presentation ist ein online Präsentationseditor, der sich anfühlt und arbeitet

      wie ein offline Editor. Benutzer können damit arbeiten, wo immer sie wollen
      und

      dank OX Drive können sie sogar synchronisierte Inhalte local auf jedem mobilen
      Gerät

      nutzen.


      ### Hinweis


      OX Documents benötigt den OX Documents-Konverter für Linux 64bit und OX App
      Suite.

      '
