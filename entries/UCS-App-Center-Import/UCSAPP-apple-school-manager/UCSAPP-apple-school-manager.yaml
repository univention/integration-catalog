    long_description: 'Mit der App Apple School Manager Connector für UCS@school provisionieren
      Sie automatisiert

      Benutzer zu [Apple School Manager (ASM)](https://school.apple.com/). Dabei nimmt
      das UCS@school Identity Management (IDM) die Rolle eines Studierendeninformationssystems
      (SIS) an und nutzt die von Apple zur Verfügung gestellte SFTP-Schnittstelle.
      Voraussetzung für den Connector ist ein Konto für eine Bildungseinrichtung in
      dem Apple School Manager.


      ### Synchronisation der kompletten Benutzerdaten vom IDM zu ASM


      Der Connector synchronisiert in seiner Standardkonfiguration jede Nacht alle
      Nutzerkonten

      der aktivierten Schulen zum ASM. Dabei werden Schulen, Klassen, Arbeitsgruppen
      und

      Benutzer (Lehrkräfte und SchülerInnen) synchronisiert.


      Sind Benutzer im IDM von UCS gelöscht, werden diese im Apple School Manager
      zunächst

      deaktiviert und nach 30 Tagen ebenfalls gelöscht.


      ### Apple-IDs, Passwörter und Gerätemanagment


      Die Apple-IDs werden automatisch generiert und bestehen standardmäßig aus benutzername@mail.domain.

      Die Passwörter der Apple-ID werden selbstständig im Apple School Manager verwaltet.


      Für das Gerätemanagement empfiehlt Univention ein Mobile Device Management (MDM).

      Grundsätzlich kann jedes MDM verwendet werden, das über eine Schnittstelle zum

      ASM verfügt. Univention empfiehlt eine MDM-Lösung aus dem [Univention App Center](https://www.univention.de/produkte/univention-app-center/app-katalog/)
      zu nutzen, da diese einer stetigen Pflege durch die Hersteller unterstehen und
      in UCS@school und in seinem Identity Management integriert sind.

      '
