    long_description: "Das UCS Dashboard ermöglicht detaillierte Domänen- und Serverüberwachung.\
      \  Es\nbesteht aus drei Modulen: einem Webinterface, einer Datenbank und einem\
      \ Client. Das\nWebinterface basiert auf der OpenSource Software [Grafana&reg;](https://grafana.com)\
      \ und der Client und die Datenbank auf \"Prometheus\".\n\nMit dem [Webinterface](https://grafana.org/)\
      \ können Metriken abgefragt und visualisiert werden, unabhängig davon wo sie\
      \ gespeichert sind.  Es ermöglicht einen umfassenden Überblick über wichtige\
      \ Aspekte der IT-Umgebung.\n\nDie UCS Dashboard App konfiguriert\n\n\n- Domain-Authentifizierung\
      \ (LDAP) für das Grafana Webinterface\n- Datenquellen\n- Standard-Dashboards\n\
      \nDie App enthält drei vordefinierte Dashboards, ein \"Domain\" Dashboard\n\
      mit:\n\n- Einer Übersicht über die Anzahl der Benutzer, Server und Clients in\
      \ der UCS-Domäne\n- UCS spezifischen Metriken für alle Server wie \"aktualisierbare\
      \ Apps\", \"UCS Version\" oder \"UCS Update verfügbar\"\n- Graphen für wichtige\
      \ Messwerte wie \"Freier Speicher\" oder \"Freier Festplattenplatz\" für alle\
      \ Server\n\nein \"Server\" Dashboard für detaillierte Metriken über einzelne\
      \ Systeme\nmit Informationen wie:\n\n- Datenträgerdurchsatz\n- Netzwerkstatus\n\
      - Disk I/O  \n\n\nund einem Dashboard zum Anzeigen einer Liste aller konfigurierten\
      \ Alarme.\n\nEigene Dashboards können einfach im Grafana Webinterface erstellt\
      \ und konfiguriert\nwerden.\n\nDie UCS Dashboard App installiert automatisch\
      \ alle benötigten Komponenten, die UCS\nDashboard Database und die UCS Dashboard\
      \ Client App. Auf allen weiteren Systemen,\ndie in den Dashboards verfügbar\
      \ sein sollen, muss zusätzlich die App \"UCS\nDashboard Client\" installiert\
      \ werden.\n\nDie Grafana Labs-Marken sind Warenzeichen von Grafana Labs und\
      \ werden mit Genehmigung\nvon Grafana Labs verwendet. Wir sind weder mit Grafana\
      \ Labs noch mit seinen Tochtergesellschaften\nverbunden, noch werden wir von\
      \ ihnen unterstützt oder gefördert.\n"
