    links:
      - Description: EduPage Website
        URL: https://www.edupage.org/
    long_description: |
      EduPage ist ein cloudbasiertes Schulverwaltungssystem, das nahtlos mit der
      weltweit führenden Stundenplansoftware aSc TimeTables integriert ist. Das
      System wird in über 173 Ländern von mehr als 150.000 Schulen eingesetzt und
      bietet über 100 Funktionen in einem System.

      ## Funktionen

      - Vollständiges Schulverwaltungssystem: Stundenplan, Vertretung, digitales
        Klassenbuch, Noten, Fehlzeiten, Hausaufgaben und mehr
      - Mobile App für Eltern, Schüler*innen und Lehrkräfte
      - Leistungsstarkes E-Learning-Werkzeug mit automatischer Auswertung
      - Interaktiver Unterricht mit Echtzeit-Feedback
      - Kommunikationsplattform für die gesamte Schulgemeinschaft
      - Stundenplanerstellung mit automatischem Generator
      - Elternabend-Buchungssystem und Zeugniserstellung

      ## Integration mit UCS@school

      EduPage ist über den Univention ID Broker an UCS@school angebunden.
      Schüler*innen und Lehrkräfte können sich mit ihrem UCS@school-Konto per
      Single Sign-On bei EduPage anmelden.
    name: EduPage
    short_description: Cloudbasiertes Schulverwaltungssystem mit Stundenplan und E-Learning
