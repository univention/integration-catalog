      - Description: EduPage Website
        URL: https://www.edupage.org/
    long_description: |
      EduPage is a cloud-based school management system fully integrated with
      the world-leading timetable software aSc TimeTables. Used in over 173
      countries by more than 150,000 schools, it provides over 100 features
      in a single system.

      ## Features

      - Complete school system: timetable, substitution, digital class register,
        grades, attendance, homework and more
      - Mobile app for parents, students and teachers
      - Powerful e-learning tool with automatic evaluation
      - Interactive lessons with real-time student feedback
      - Communication platform for the entire school community
      - Automatic timetable generator
      - Parent-teacher meeting booking system and certificate generation

      ## Integration with UCS@school

      EduPage is connected to UCS@school via the Univention ID Broker.
      Students and teachers can log in to EduPage with their UCS@school
      credentials using Single Sign-On.
