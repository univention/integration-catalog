    long_description: |
      bettermarks is an adaptive learning system for mathematics supporting
      students in grades 4 to 10. The AI-powered platform adapts to each
      student's individual learning level and provides targeted exercises
      with immediate feedback.

      ## Features

      - Adaptive, AI-powered learning and teaching platform for mathematics
      - Scientifically proven learning efficacy
      - Covers grades 4–10, all German federal states and curricula
      - Immediate feedback and individual learning paths
      - Teacher dashboard for monitoring learning progress
      - Whitelabel platform available for publishers

      ## Integration with UCS@school

      bettermarks is connected to UCS@school via the Univention ID Broker.
      Students and teachers can log in to bettermarks with their familiar
      UCS@school credentials using Single Sign-On.
