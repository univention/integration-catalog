      URL: ''
    long_description: 'Mit dem audriga Groupware Migrationsservice können Sie E-Mails,
      Kontakte und Kalendereinträge

      von anderen Servern oder Hosting-Angeboten zu UCS umziehen. Die Anwendung installiert

      einen Link zur Migrationsanwendung von audriga, auf der die Migration konfiguriert

      und durchgeführt wird. Der Service verbindet sich über Standardprotokolle (IMAP,

      EWS, CardDAV, CalDAV), die über das Internet erreichbar sein müssen. Alle gängigen

      IMAP Server werden unterstützt. Kontakte und Kalendereinträge werden bei MS
      Exchange,

      Open-Xchange und Kolab unterstützt. Bei anderen Systemen kontaktieren Sie bitte

      audriga.

      '
    name: audriga Groupware Migration Service
    short_description: 'Service zur einfachen Migration von E-Mail-Konten

      '
    tags: []
    visuals:
