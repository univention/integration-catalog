    long_description: "```This internal app is used to build a redis database cache\
      \ for the Univention ID \nBroker component Self-disclosure API to  increase\
      \ the performance of the Self-disclosure \nAPI.The app is intended for internal\
      \ use only.It provides an endpoint at\nhttps://example.com/ucsschool/id-broker-sddb-builder/v1\
      \ to queue user, group and \nschool objects, which are to be added to the cache.Outside\
      \ of the container, the \n/var/log/univention/id-broker-sddb-builder directory\
      \ is exposed.```\n"
    name: Univention ID Broker Self-disclosure DB Builder
