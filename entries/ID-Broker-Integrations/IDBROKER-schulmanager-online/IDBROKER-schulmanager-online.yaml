        URL: https://schulmanager-online.de/
    long_description: |
      Schulmanager Online is a comprehensive online platform for complete school
      organisation. More than 3,500 schools use the solution daily for planning,
      organising and communicating.

      ## Features (31 modules)

      - Digital class register, absences, grades and sick-note management
      - Parent letters, messages and parent-teacher appointment booking
      - Timetable planning, substitution planning and info screen
      - Video conferencing, elective courses, all-day care and resource booking
      - School enrolment, report cards and grade conferences
      - Calendar, documents and notice board
      - Single Sign-On via OpenID Connect (e.g. with UCS@school)
      - Hosted in an ISO 27001-certified data centre in Germany
      - Modular design – individually customisable

      ## Integration with UCS@school

      Schulmanager Online is connected to UCS@school via the Univention ID Broker.
      Students and teachers can log in to Schulmanager Online with their
      UCS@school credentials using Single Sign-On.
