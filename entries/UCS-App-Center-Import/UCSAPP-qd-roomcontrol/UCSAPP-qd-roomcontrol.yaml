    long_description: "Die smarte Fernbedienung für moderne Unternehmen und digitale\
      \ Klassenzimmer.\n\n\nQD RoomControl ist eine intelligente Fernbedienungslösung\
      \ für Unternehmen, Schulen\nund öffentliche Einrichtungen.\n\nSie ermöglicht\
      \ es Nutzern, Projektoren, Displays und andere angeschlossene Geräte\nvon jedem\
      \ autorisierten Desktop PC oder mobilem Endgerät aus zu steuern - ganz ohne\n\
      zusätzliche Hardware.\n\n\nVollständig in die IT-Infrastruktur Ihrer Organisation\
      \ integriert (einschließlich\nUnterstützung für Single Sign-On und rollenbasierte\
      \ Benutzerverwaltung), vereinfacht\nQD RoomControl die AV-Steuerung und macht\
      \ physische Fernbedienungen überflüssig.\n\nNutzer - wie z.B. Administratoren,\
      \ Lehrkräfte oder Mitarbeitende - können Geräte\nein- und ausschalten, Eingänge\
      \ wechseln, die Lautstärke anpassen oder vordefinierte\nSzenen mit nur wenigen\
      \ Klicks aktivieren.\n\n\nHauptfunktionen:\n\n\n- Zentrale Fernsteuerung von\
      \ Projektoren über Browser via allen Desktop-PCs und mobilen Endgeräten\n- Integration\
      \ mit Microsoft 365 / Active Directory oder anderen Identitätsanbietern über\
      \ SAML oder OpenID Connect (z.B. Keycloak, UCS)\n- Rollenbasierte Zugriffskontrolle\
      \ für Personal, IT-Administratoren, Lehrkräfte, Benutzer, Gruppen und Rollen\n\
      - Unterstützung aller gängiger Projektormarken und Netzwerkprotokolle\n- Optimiert\
      \ die Verwaltung von Besprechungsräumen, Präsentationen und Klassenzimmern.\n\
      \nApp Dokumentation: [https://qua-dev.com/qd-roomcontrol](https://qua-dev.com/qd-roomcontrol)\
      \  \n   \nZum vollumfängliche Betrieb dieser App ist eine Lizenzierung notwendig.\
      \  \nFalls keine Lizenz vorhanden ist, wird automatisch eine Trial-Lizenz genutzt.\
      \  \n    \nNach Installation dieser App kann sich der Admin wie unter [https://qua-dev.com/qd-roomcontrol#3-2_admin-user](https://qua-dev.com/qd-roomcontrol#3-2_admin-user)\
      \ beschrieben einloggen und die App weiter einrichten.\n"
    name: QD RoomControl
    short_description: 'QD RoomControl ist eine Fernbedienungs-App für Beamer und
      andere Geräte.

      '
