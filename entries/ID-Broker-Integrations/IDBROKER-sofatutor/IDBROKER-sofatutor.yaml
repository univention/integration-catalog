    long_description: |
      sofatutor is one of Germany's leading online learning platforms with over
      2.1 million users. The platform offers more than 6,630 learning videos and
      33,972 exercises covering all school subjects and grade levels from
      grade 1 to 13.

      ## Features

      - 6,630+ learning videos for all subjects and grade levels (1–13)
      - 33,972+ interactive exercises with immediate feedback
      - Adaptive learning plan tailored to individual learning levels
      - Vocabulary trainer for English, French and Spanish
      - Learning game Sofaheld for independent practice (grades 1–9)
      - Worksheets for exam preparation
      - 24h homework chat with real teachers
      - AI learning assistant Sofabuddy with voice feature
      - Multiple award-winning (incl. Handelsblatt "Best Online Portal")

      ## Integration with UCS@school

      sofatutor is connected to UCS@school via the Univention ID Broker.
      Students and teachers can log in to sofatutor with their UCS@school
      credentials using Single Sign-On.
