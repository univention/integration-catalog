    links:
      - Description: Edumaps Website
        URL: https://edumaps.de/
    long_description: |
      Edumaps ist ein visueller Arbeitsraum für Unterricht und Organisation.
      Die Plattform ermöglicht das Erstellen strukturierter digitaler Pinnwände
      aus Ideen, Materialien und Aufgaben. Über 8.600 Schulen nutzen Edumaps
      aktiv, mit Landeslizenzen in Hessen, Niedersachsen und Sachsen-Anhalt.

      ## Funktionen

      - Digitale Pinnwände, Galerien, Zeitstrahlen, Stickerwände und Wochenpläne
      - Kollaboratives Arbeiten in Echtzeit im Kollegium
      - KI-Unterstützung: Pinnwände mit KI erstellen und ändern, Quiz-Maps
        automatisch generieren, Text-zu-Sprache
      - Auftragsmodul: Aufgaben zuweisen und Rückmeldungen einholen
      - Buchungs- und Verleihsystem für Räume und Geräte
      - Export als Moodle-Kurs, PDF, Bild oder Offline-HTML
      - Über 100 Dateiformate unterstützt
      - DSGVO-konform, geprüft durch datenschutz nord GmbH und VIDIS-Projekt
      - Content-Security-Policy und Barrierefreiheit (ADA)
      - Umfragen, Abstimmungen, Kalender, QR-Codes und öffentliche Profile

      ## Integration mit UCS@school

      Edumaps ist über den Univention ID Broker an UCS@school angebunden.
      Schüler*innen und Lehrkräfte können sich mit ihrem UCS@school-Benutzerkonto
      per Single Sign-On bei Edumaps anmelden.
