        URL: https://www.sofatutor.com/
    long_description: |
      sofatutor ist eine der führenden deutschen Online-Lernplattformen mit
      über 2,1 Millionen Nutzer*innen. Die Plattform bietet mehr als 6.630
      Lernvideos und 33.972 Übungen für alle Schulfächer und Klassenstufen
      von Klasse 1 bis 13.

      ## Funktionen

      - 6.630+ Lernvideos für alle Schulfächer und Klassenstufen (1–13)
      - 33.972+ interaktive Übungen mit sofortigem Feedback
      - Adaptiver Lernplan passend zum individuellen Lernstand
      - Vokabeltrainer für Englisch, Französisch und Spanisch
      - Lernspiel Sofaheld für selbstständiges Üben (Klassen 1–9)
      - Arbeitsblätter zur Klassenarbeitsvorbereitung
      - 24h-Hausaufgaben-Chat mit echten Lehrkräften
      - KI-Lernhilfe Sofabuddy mit Sprachfunktion
      - Mehrfach ausgezeichnet (u.a. Handelsblatt „Bestes Online-Portal")

      ## Integration mit UCS@school

      sofatutor ist über den Univention ID Broker an UCS@school angebunden.
      Schüler*innen und Lehrkräfte können sich mit ihrem UCS@school-Benutzerkonto
      per Single Sign-On bei sofatutor anmelden.
