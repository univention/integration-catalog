    long_description: "Kanban boards are excellent tools for maintaining to-do lists,\
      \ organizing teamwork\nat school or with your co-workers, or planning a party\
      \ as well as the next vacation.\nThey help you to structure tasks, visualize\
      \ projects, and carry them out more efficiently.\nWekan is an Open Source Kanban\
      \ board. It can help you to concentrate on certain tasks\nand activities, and\
      \ keep an eye on your projects and approaching deadlines.  \n\n\n## Managing\
      \ Tasks with Wekan\nLike other Kanban boards, [Wekan](https://wekan.github.io/)\
      \ works with cards, boards, lists, swimlanes, labels, templates, and archiving\
      \ options. You can add colors to your cards that work as visual markers, drag\
      \ and drop them to other lists or boards, and attach files. Wekan also offers\
      \ collaborative editing options that makes your teamwork more transparent: add\
      \ other members to boards and cards, and assign tasks to users with a few clicks.\
      \  \n\n\n## Wekan and UCS\nWekan integrates well with UCS and makes use of its\
      \ LDAP directory service. You can\nallow access to Wekan via the Univention\
      \ Management Console (UMC) and enable individual\nusers or all domain members.\
      \ On top of that you can create specific administrator\naccounts in UMC that\
      \ have the admin role in the Wekan web interface to manage other\nuser accounts\
      \ there.\n"
    name: Wekan
    short_description: 'Open Source kanban board

      '
