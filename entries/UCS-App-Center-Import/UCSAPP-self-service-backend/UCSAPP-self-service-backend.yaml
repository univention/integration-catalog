    long_description: "Diese App stellt das Bachend für den Nubus Endanwender Self\
      \ Service für Ihre UCS-Umgebung\nbereit.  \n\nDer Nubus Self Service erlaubt\
      \ es den Benutzern selbständig und ohne Administratorunterstützung\nihre Benutzerdaten\
      \ zu verwalten. Zur Zeit existieren die folgenden Module, die über\ndas Menü\
      \ im Nubus Portal oder direkten Zugriff per Link erreichbar sind:  \n\n\n- Passwort\
      \ ändern: Benutzer können ihr Passwort ändern, wenn sie ihr aktuelles Passwort\
      \ kennen\n- Passwort zurücksetzen: Benutzer können ihr Passwort zurücksetzen,\
      \ indem sie einen Schlüssel (Token) an eine zuvor hinterlegte E-Mailadresse\
      \ oder Mobiltelefonnummer per SMS schicken lassen. Mit dem Zugangstoken können\
      \ sich Benutzer ein neues Passwort setzen.\n- Eigene Kontaktinformationen bearbeiten:\
      \ Benutzer können nach Anmeldung Ihre eigenen Kontaktattribute pflegen. Administratoren\
      \ können die hier angezeigten Attribute inklusive deren Reihenfolge festlegen.\n\
      Zusätzlich wird eine \"Einladungs\"-Funktion hinzugefügt: Beim Anlegen\neines\
      \ neuen Benutzers kann, statt der Vergabe eines initialen Passworts, eine E-Mailadresse\n\
      für das Einladen des Benutzers angegeben werden. In diesem Verfahren wird neuen\n\
      Anwendern ein Token des Self Service übermittelt, um so ihr Passwort selbst\
      \ festzulegen.  \nDurch den Benutzer Self Service können die Aufwände im IT\
      \ Helpdesk für die Bearbeitung\nderartiger Anfragen reduziert werden.\n"
    name: Self Service Backend
    short_description: 'Self Service Backend-Komponenten

