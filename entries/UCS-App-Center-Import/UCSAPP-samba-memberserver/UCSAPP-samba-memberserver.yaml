      URL: ''
    long_description: 'Diese App erweitert UCS Systeme in der Rolle Memberserver um
      Datei- und Druckdienste.


      Der Dateidienst stellt zentral benötigte Dateien über das Netzwerk bereit und
      ermöglicht

      es unter anderem Benutzerdaten auf einem zentralen Server zu bündeln. Dateidienste

      können als Windows-Dateifreigabe auf Windows-Clients eingebunden werden. Die
      in

      UCS integrierten Dateidienste unterstützen eine Bereitstellung von Freigaben
      auf

      Basis von CIFS/SMB.


      Als Druckdienst können die unter UCS eingerichteten Drucker als Netzwerkdrucker

      für Windows-Clients freigegeben werden. Hierfür wird die Druckserver-App benötigt.

      '
    name: Windows-kompatibler Memberserver
    short_description: 'Windows-kompatibler Fileserver auf der Basis von Samba

      '
    tags: []
    visuals:
    - ''
  en-US:
    icon: ucs_logo.svg
    keywords:
    - UCS components
    - Infrastructure
    - Storage
    - Printing
    links:
    - Description: ''
      URL: ''
    long_description: 'This app extends UCS systems in the role of a member server
      with file and print services.


      The file service provides needed files centrally over the network and allows
      to consolidate

      user data on a central server. File services can be mounted as Windows file
      share

      on Windows clients. The integrated file services in UCS allow shares based on
      CIFS/SMB.


      The print service shares configured printers as network printers for Windows
      clients.

      The print server app is required for this.

      '
    name: Windows-compatible Memberserver
    short_description: 'Windows-compatible file/print server based on Samba

      '
    tags: []
    visuals:
    - ''
