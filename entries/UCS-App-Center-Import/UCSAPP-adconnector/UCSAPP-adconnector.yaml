    long_description: 'Mit dem Einsatz der Active Directory-Verbindung vermeiden Sie
      eine doppelte, komplexe

      und somit fehleranfällige Administration der Verzeichnisdienstobjekte Ihres
      Active

      Directory (AD). Denn mit Hilfe dieser Nubus-Komponente für UCS führen Sie ein
      bestehendes

      AD und eine Domäne, die mit Nubus auf UCS verwaltet wird, zusammen. So richten
      Sie

      einen automatischen Abgleich zwischen Microsoft Windows Active Directory und
      Nubus

      ein. Die Synchronisation schließt verschlüsselte Passwörter, Gruppen- und Rechnerdefinitionen

      sowie andere Verzeichnisdienstobjekte mit ein.


      Beim Verwenden der Active Directory-Verbindung können Sie aus zwei Betriebsmodi

      wählen: Entweder fügen Sie Nubus auf UCS als Teil einer bestehenden Windows
      Active

      Directory-Domäne hinzu oder Sie betreiben den Nubus-Verzeichnisdienst mit OpenLDAP

      parallel zum AD.


      ## Nubus auf UCS als Teil einer Active Directory-Domäne


      Wenn Sie Nubus auf UCS in eine bestehende Windows Active Directory-Domäne integrieren,

      installieren Sie das Managementsystem als vollwertiges Mitglied. In diesem Modus

      bleibt das Active Directory Ihrer Domäne weiterhin der primäre Verzeichnisdienst

      und es werden keine Veränderungen an der Domäne vorgenommen.


      Bei dieser Einsatzart der „Active Directory-Verbindung“ erweitern Sie Ihre bestehende

      Windows-Domäne um alle Funktionen von UCS. Unter anderem können Sie UCS dann
      als

      Plattform nutzen und Apps und Integrationspakete aus dem Univention App Center
      installieren

      und einfach bereitstellen.


      Da für alle gehosteten Apps etablierte Authentifizierungsdienste bereitstehen,
      wird

      die native Active Directory-Domäne als primäre Lösung für das Identity Management

      genutzt. Das bringt für Administratoren eine große Arbeitserleichterung.


      ## Active Directory- und Nubus-Domänen auf UCS parallel betreiben


      Sie können mit der App „Active Directory-Verbindung“ Nubus auf UCS parallel

      zu einem AD betreiben. Mit der automatischen Synchronisation zwischen Nubus
      und Microsoft

      Windows Active Directory werden Daten wie Benutzer, Gruppen und Passwörter sowohl

      im AD als auch im LDAP vorgehalten. Das ermöglicht sowohl eine uni- als auch
      bidirektionale

      Synchronisation und stellt sicher, dass Windows- und Nubus-Umgebungen reibungslos

      und ohne hohen Administrationsaufwand parallel betrieben werden. Darüber hinaus

      können auch mehrere Microsoft Windows-Domänen zeitgleich synchronisiert werden.

      Dies ermöglicht einen effektiven Aufbau eines Open Source-Metaverzeichnisses.
      Über

      das voneinander unabhängige Windows-Domänen und viele weitere Infrastrukturkomponenten

      verwaltet werden können.


      ## Bestehende Active Directory-Domäne durch Nubus auf UCS ablösen


      Für die Ablösung eines bestehenden Microsoft Windows Active Directory steht
      Ihnen

      im App Center die Komponente „Active Directory Takeover“ zu Verfügung. Der Nubus

      Samba-Domänencontroller übernimmt dabei die Daten des Windows Active Directory-Domänencontrollers

      und nimmt für die Umgebung seinen funktionalen Platz ein. Nähere Informationen

      zur App „Active Directory Takeover“ finden Sie im Univention App Center.

      '
    name: Active Directory-Verbindung
    short_description: 'Integration von Nubus auf UCS in ein vorhandenes Active Directory

      '
