        URL: https://itslearning.com/
    long_description: |
      itslearning is Europe's leading Learning Management System (LMS) for
      schools. The platform supports teachers in planning lessons, providing
      materials, assigning tasks and tracking learning progress.

      ## Features

      - Lesson planning and delivery with digital content
      - Assignment creation, submission and grading
      - Communication between teachers, students and parents
      - Collaborative work and sharing of materials
      - Learning progress tracking and reporting
      - Integration of external learning tools and media (LTI)

      ## Integration with UCS@school

      itslearning is connected to UCS@school via the Univention ID Broker.
      Students and teachers can log in to itslearning with their UCS@school
      credentials using Single Sign-On.
