    long_description: 'ONLYOFFICE Docs Enterprise Edition is a rich in functionality
      and deeply Microsoft

      Office OOXML-compatible office suite built for bigger teams with high professional

      requirements. It incorporates three collaborative editors for working on text
      documents,

      presentations and spreadsheets. ONLYOFFICE Docs Enterprise Edition offers scalability(\*),

      advanced functionality, extended security and included professional tech support.


      ONLYOFFICE Docs Enterprise Edition features:


      - Complete set of editing and formatting instruments organized in the intuitive
      tabbed interface;

      - Professional writing: footnotes, table of contents, bookmarks, navigation;

      - Presenter View, notes and more demonstration features in presentations;

      - Over 450 formulas, flexible filters and ranges, visualization with charts
      and other elements in spreadsheets;

      - Real-time collaboration in Fast and Strict modes, flexible access rights,
      chat, comments, Version History and Track Changes mode;

      - Advanced editing features such as document comparison and the extended list
      of Content Controls for creating forms.

      - Mobile web editors.

      - Collection of third party add-ons for editing pictures, inserting videos,
      translating and more;

      - Document and editing security: JWT, HTTPS, end-to-end encryption, user access
      restriction.


      ONLYOFFICE features maximum compatibility with popular formats and supports
      DOC,

      DOCX, TXT, ODT, RTF, ODP, EPUB, ODS, XLS, XLSX, CSV, PPTX and HTML.


      Compare ONLYOFFICE Docs Enterprise Edition and ONLYOFFICE Docs Community Edition
      ](https://www.onlyoffice.com/compare-editions.aspx\ "\")


      Compared to other online office suites, ONLYOFFICE Docs provides you with the
      most

      complete set of tools. Learn more about 11 things you can do with ONLYOFFICE
      Docs,

      but can\\u2019t with Google Docs or MS Word Online in the  comparative review
      ](http://www.onlyoffice.com/blog/2017/01/11-things-you-can-do-with-onlyoffice-but-cant-with-google-docs-or-ms-word-online/\
      "\").


      (\*) ONLYOFFICE Docs plans are based on simultaneous connections. These are
      the maximum

      number of documents that can be edited at the same time.


      ### About this app


      This app is the Enterprise Edition of ONLYOFFICE Docs. It is recommended for
      teams

      of more than 20 users and requires the ONLYOFFICE Docs Enterprise Edition license,

      which can be obtained via the \\u201cBuy now\\u201d button in the App Center
      Shop.


      Your documents are stored in file sync and share solutions like Nextcloud, ownCloud,

      or Seafile. ONLYOFFICE does not store user document data.


      Before installing ONLYOFFICE Docs Enterprise Edition please uninstall ONLYOFFICE

      Docs Community Edition. Your documents will remain in your file sync and share
      solution

      and can be accessed afterwards via ONLYOFFICE Docs Enterprise Edition.

      '
    name: ONLYOFFICE Docs Enterprise Edition
    short_description: 'Feature-rich office suite on your own server

      '
