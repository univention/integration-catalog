    long_description: |
      TaskCards is a GDPR-compliant digital pinboard for the classroom,
      developed specifically for the German education sector. With TaskCards,
      teachers and students can collaboratively create, share and edit digital
      content.

      ## Features

      - Digital pinboards for collaborative classroom work
      - Various card types: text, image, video, audio, links, tasks
      - GDPR-compliant, servers in Germany
      - No student registration required
      - Simple sharing via link or QR code
      - Integration into common learning management systems

      ## Integration with UCS@school

      TaskCards is connected to UCS@school via the Univention ID Broker.
      Students and teachers can log in to TaskCards with their UCS@school
      credentials using Single Sign-On.
