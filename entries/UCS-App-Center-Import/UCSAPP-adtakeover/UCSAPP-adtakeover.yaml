  en-US:
    icon: ucs_logo.svg
    keywords:
    - UCS components
    - Infrastructure
    - Identity Management
    links:
    - Description: ''
      URL: ''
    long_description: 'Univention Active Directory Takeover was developed to migratethe
      objects stored in

      a native Active Directory domain controller to aUnivention Nubus Samba/AD domain

      controller. This simplifies a migration of anexisting Active Directory domain
      to

      a Nubus on UCS Samba/AD domain, maintainingall GPO settings, SIDs and group
      memberships.

      The goal of this module is tofinally switch off all Active Directory domain
      controllers.

      This is different tothe goal of the application Active Directory Connection,
      which

      allows operationof UCS as a member of or in parallel to an AD domain.

      '
    name: Active Directory Takeover
    short_description: 'Transfer existing Active Directory domains to Nubus on UCS

      '
    tags: []
    visuals:
    - thumbnail_1.png
