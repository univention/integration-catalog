    long_description: "The smart remote control for modern businesses and digital\
      \ classrooms.\n\n\nQD RoomControl is a smart remote control solution designed\
      \ for businesses, schools,\nand public institutions.\n\nIt allows users to control\
      \ projectors, displays, and other connected devices from\nany authorized desktop\
      \ or mobile device - no additional hardware required.\n\n\nFully integrated\
      \ with your organization's IT infrastructure (including support for\nSingle\
      \ Sign-On and user roles), QD RoomControl simplifies AV control workflows and\n\
      eliminates the need for physical remotes. Users - such as admins, teachers,\
      \ or general\nstaff - can power devices on or off, switch inputs, adjust volume,\
      \ or activate predefined\nscenes with just a few clicks.\n\n\nKey features:\n\
      \n\n- Centralized projector remote control via browser from all desktop pcs\
      \ and mobile devices\n- Integration with Microsoft 365 / Active Directory or\
      \ other identity providers via SAML or OpenID Connect (e.g., Keycloak, UCS)\n\
      - Role-based access control for staff, IT admins, teachers, users, groups, and\
      \ roles\n- Support for all common projector brands and network protocols\n-\
      \ Streamlines presentation, meeting room, or classroom management\n\nApp documentation:\
      \ [https://qua-dev.com/qd-roomcontrol](https://qua-dev.com/qd-roomcontrol) \
      \ \n\n\nLicensing is required to fully operate this app.\n\nIf no license is\
      \ available, a trial license is automatically used.  \n\nAfter installing this\
      \ app, the admin can log in as described at [https://qua-dev.com/qd-roomcontrol#3-2_admin-user](https://qua-dev.com/qd-roomcontrol#3-2_admin-user)\
      \ and continue setting up the app.\n"
    name: QD RoomControl
    short_description: 'QD RoomControl is a remote control app for projectors and
      other devices.

      '
    tags: []
    visuals:
